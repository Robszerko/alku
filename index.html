<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áll az Alku - Végleges TV Kiadás (Kijátszás, Extrák & Pánikgomb)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Roboto:wght@400;700;900&display=swap');

        :root {
            --gold: #f8b500; --gold-light: #fceabb;
            --case-red: #a01010; --case-dark: #4a0505;
            --text-light: #f3f4f6; --offer-accept: #10b981;
            --offer-decline: #ef4444; --mystery-purple: #8b5cf6;
        }

        body {
            font-family: 'Roboto', sans-serif; 
            background-color: #5c0002;
            background-image: 
                radial-gradient(circle at 50% 50%, #2b0000 2%, transparent 3%),
                linear-gradient(45deg, rgba(0,0,0,0.4) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.4) 75%),
                linear-gradient(-45deg, rgba(0,0,0,0.4) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.4) 75%);
            background-size: 60px 60px; color: var(--text-light); margin: 0; padding: 10px; min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden; user-select: none;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.95);
        }

        .container { max-width: 1600px; margin: 0 auto; width: 100%; flex-grow: 1; display: flex; flex-direction: column; position: relative;}
        
        header { display: flex; flex-direction: column; align-items: center; padding-bottom: 10px; margin-bottom: 15px; position: relative; }

        .logo-container {
            display: inline-flex; align-items: stretch; background: #000; padding: 4px;
            border: 2px solid #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px var(--gold);
            margin-bottom: 10px; transform: scale(0.9);
        }

        .logo-box {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold), #c99300); color: #000;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.5rem;
            padding: 5px 20px; display: flex; align-items: center; justify-content: center;
            letter-spacing: 2px; text-transform: uppercase; text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }
        
        .logo-box.stacked {
            flex-direction: column; font-size: 1.2rem; padding: 2px 10px; line-height: 1.1;
            letter-spacing: 0; border-left: 5px solid #000; border-right: 5px solid #000;
        }

        .header-buttons { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; }
        .header-btn-group { display: flex; gap: 10px; }

        .header-btn {
            color: white; border: 2px solid #fff; border-radius: 8px; padding: 10px 15px; 
            font-weight: 900; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: all 0.2s; 
        }
        .header-btn:hover:not(:disabled) { transform: translateY(-2px); }
        .header-btn:disabled { background: linear-gradient(to bottom, #444, #222) !important; color: #888 !important; border-color: #555 !important; cursor: not-allowed; box-shadow: none; transform: none; animation: none !important;}

        #uj-jatek-gomb { background: linear-gradient(to bottom, var(--gold), #966e00); color: black; }
        #uj-jatek-gomb:hover { box-shadow: 0 5px 25px var(--gold); }

        #powerup-gomb { background: linear-gradient(to bottom, #10b981, #047857); animation: pulse-green 2s infinite; }
        #powerup-gomb:hover:not(:disabled) { box-shadow: 0 5px 25px #10b981; }

        #panik-gomb { background: linear-gradient(to bottom, #ef4444, #991b1b); animation: pulse-red 2s infinite; }
        #panik-gomb:hover:not(:disabled) { box-shadow: 0 5px 25px #ef4444; }

        @keyframes pulse-green { 0% { box-shadow: 0 0 5px #10b981; } 50% { box-shadow: 0 0 20px #34d399; } 100% { box-shadow: 0 0 5px #10b981; } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 5px #ef4444; } 50% { box-shadow: 0 0 20px #f87171; } 100% { box-shadow: 0 0 5px #ef4444; } }

        .copyright-info { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; color: rgba(255, 255, 255, 0.6); text-shadow: 2px 2px 4px #000; text-align: center;}

        .jatekterulet { display: flex; flex-direction: column; width: 100%; flex-grow: 1; z-index: 2; position: relative;}
        
        .penzfa-wrapper { display: flex; justify-content: space-between; width: 100%; gap: 4px; margin-bottom: 15px; }
        .penzfa-kontener { list-style: none; padding: 0; margin: 0; width: 49%; display: flex; flex-direction: column; gap: 4px; }
        .penzfa-elem { 
            padding: 4px 6px; border-radius: 4px; text-align: right; font-weight: 900; 
            transition: all 0.5s ease; font-family: 'Roboto', sans-serif; font-size: clamp(0.6rem, 2.3vw, 0.85rem); 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.8);
            box-shadow: 0 3px 6px rgba(0,0,0,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .penzfa-elem .tipus-icon { opacity: 0.8; font-size: 1.1em; flex-shrink: 0; }
        
        .prize-tier-joke.aktiv { background: linear-gradient(90deg, #1e293b 0%, #334155 100%); color: #cbd5e1; }
        .prize-tier-joke.aktiv.jobb-oldal { background: linear-gradient(90deg, #334155 0%, #1e293b 100%); }

        .prize-tier-small.aktiv { background: linear-gradient(90deg, #78350f 0%, #b45309 100%); color: #fef3c7; }
        .prize-tier-small.aktiv.jobb-oldal { background: linear-gradient(90deg, #b45309 0%, #78350f 100%); }

        .prize-tier-medium.aktiv { background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%); color: #eff6ff; }
        .prize-tier-medium.aktiv.jobb-oldal { background: linear-gradient(90deg, #3b82f6 0%, #1e3a8a 100%); }

        .prize-tier-large.aktiv { background: linear-gradient(90deg, #b48600 0%, #ffd700 100%); color: #000; }
        .prize-tier-large.aktiv.jobb-oldal { background: linear-gradient(90deg, #ffd700 0%, #b48600 100%); }

        .prize-tier-huge.aktiv { background: linear-gradient(90deg, #064e3b 0%, #10b981 100%); color: #fff; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); text-shadow: 1px 1px 2px #000;}
        .prize-tier-huge.aktiv.jobb-oldal { background: linear-gradient(90deg, #10b981 0%, #064e3b 100%); }

        .penzfa-elem.kiesett { background: #1a1a1a !important; color: #444 !important; text-decoration: line-through; opacity: 0.6; border-color: #000; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); text-shadow: none;}

        #fő-kontener { display: flex; flex-direction: column; align-items: center; width: 100%; flex-grow: 1; position: relative; max-width: 100%; overflow: hidden;}
        
        #informacios-sav-kontener { perspective: 1200px; margin-bottom: 25px; width: 100%; }
        #info-flipper { 
            width: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d; min-height: 250px;
        }
        #info-flipper.flipped { transform: rotateX(180deg); }
        
        .info-front, .info-back { 
            backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; box-sizing: border-box; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); text-align: center;
        }
        
        .info-front { 
            width: 100%; height: 100%; padding: 15px; position: relative;
            background: linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0.9), rgba(0,0,0,0.7)); 
            border: 2px solid rgba(212, 175, 55, 0.5); 
            transition: all 0.3s;
        }
        
        .info-back { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 15px 10px;
            background: linear-gradient(145deg, #3a0000, #150000, #3a0000); 
            border: 3px solid var(--gold); transform: rotateX(180deg); 
            justify-content: center; gap: 6px; overflow-x: hidden; overflow-y: auto;
        }
        .info-back::-webkit-scrollbar { width: 6px; }
        .info-back::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        .info-back::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        #uzenetek { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 900; color: var(--gold-light); display: flex; justify-content: center; align-items: center; text-shadow: 1px 1px 3px #000; text-align: center;}
        #kiegeszito-uzenet { font-size: clamp(0.9rem, 2vw, 1.2rem); color: #cbd5e1; margin-top: 8px;}
        #bekiabalas { font-size: clamp(1rem, 2.5vw, 1.3rem); color: #fca5a5; font-weight: 900; margin-top: 8px; font-style: italic; text-shadow: 1px 1px 2px #000;}

        .telefon-ikon { display: none; font-size: 3.5rem; margin-right: 15px; filter: drop-shadow(0 0 15px #ff0000); }
        .telefon-hivas-aktiv .telefon-ikon { display: inline-block; animation: ringing 0.2s infinite; }
        .telefon-hivas-aktiv #uzenetek-szoveg { color: #ff4444 !important; text-shadow: 0 0 15px #ff0000; font-size: 1.8rem;}
        .telefon-hivas-aktiv.info-front { animation: pulse-red-border 0.6s infinite alternate; }

        /* Hacker Glitch Effect */
        .hacker-glitch { animation: glitch-anim 0.2s infinite; background: #000 !important; border-color: #22c55e !important; box-shadow: 0 0 20px #22c55e inset !important;}
        .hacker-glitch * { color: #22c55e !important; text-shadow: 0 0 5px #22c55e !important; font-family: monospace !important;}
        @keyframes glitch-anim { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }

        @keyframes pulse-red-border {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000 inset, 0 5px 25px rgba(255,0,0,0.6); }
            100% { border-color: #aa0000; box-shadow: 0 0 5px #aa0000 inset, 0 5px 15px rgba(0,0,0,0.8); }
        }
        @keyframes ringing {
            0% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(25deg) scale(1.2); }
            50% { transform: rotate(-25deg) scale(1.2); } 75% { transform: rotate(25deg) scale(1.2); }
            100% { transform: rotate(0deg) scale(1); }
        }

        #back-cim { margin: 0; font-size: clamp(1rem, 2vw, 1.3rem); color: #fca5a5; font-family: 'Orbitron'; text-transform: uppercase; letter-spacing: 2px;}
        #back-osszeg { font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 900; color: var(--gold-light); font-family: 'Orbitron'; margin: 5px 0; text-shadow: 0 0 15px var(--gold); }
        #back-leiras { font-size: clamp(0.7rem, 1.3vw, 0.95rem); color: #e5e7eb; margin-bottom: 8px; line-height: 1.3; }

        .back-gombok { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 5px; align-items: center;}
        .back-gomb {
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(0.65rem, 1.5vw, 0.9rem); text-transform: uppercase;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .btn-elfogad { background: linear-gradient(145deg, var(--offer-accept), #047857); color: white; border: 2px solid #34d399;}
        .btn-elutasit { background: linear-gradient(145deg, var(--offer-decline), #991b1b); color: white; border: 2px solid #f87171;}
        .btn-vegso { background: linear-gradient(145deg, var(--gold), #b48600); color: black; border: 2px solid #fef08a;}
        .btn-koteg { background: linear-gradient(145deg, #1e3a8a, #172554); color: white; border: 2px solid #60a5fa;}
        .btn-extra { background: linear-gradient(145deg, #7c3aed, #4c1d95); color: white; border: 2px solid #c4b5fd;}
        .btn-fekete { background: linear-gradient(145deg, #222, #000); color: #ccc; border: 2px solid #666; box-shadow: 0 0 15px rgba(255,255,255,0.2);}
        
        .back-gomb:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.7); }
        .back-gomb:active { transform: translateY(2px); }

        /* Counter Offer Input */
        #alku-input { 
            padding: 8px; font-family: 'Orbitron'; font-size: 1.2rem; font-weight: bold; width: 200px;
            border: 2px solid var(--gold); border-radius: 5px; background: #111; color: #fff; text-align: center; margin-right: 10px;
        }
        #alku-input:focus { outline: none; box-shadow: 0 0 15px var(--gold); }
        
        /* Time Bomb UI */
        #timer-bar-container { width: 80%; height: 10px; background: #333; border-radius: 5px; margin: 10px auto; overflow: hidden; border: 1px solid #555;}
        #timer-bar { width: 100%; height: 100%; background: #ef4444; transition: width 0.1s linear; }
        
        .stop-btn {
            background: linear-gradient(to bottom, #ff4444, #aa0000); color: white; padding: 10px 30px; font-size: 1.5rem;
            border: 2px solid white; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; 
            margin-top: 15px; box-shadow: 0 0 15px #ff0000; transition: transform 0.1s, box-shadow 0.2s;
        }
        .stop-btn:hover { box-shadow: 0 0 25px #ff0000; }
        .stop-btn:active { transform: scale(0.95); }

        #taska-racs { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); 
            gap: 12px; width: 100%; perspective: 1200px; padding: 10px; max-width: 950px; justify-content: center;
        }
        .taska { position: relative; aspect-ratio: 1.15 / 1; transform-style: preserve-3d; cursor: pointer; transition: transform 0.2s; }
        .taska:hover:not(.nyitott) { transform: translateY(-5px) scale(1.05); }
        .taska.animacio-nyitas { animation: shake-and-flip 1.2s ease-in-out forwards; pointer-events: none; }
        .taska.nyitott { transform: rotateY(180deg); pointer-events: none; }
        
        .taska.animacio-rontgen { animation: peek-flip 2.5s ease-in-out forwards; pointer-events: none; }
        .taska.rontgen-celpont:hover { box-shadow: 0 0 20px #10b981; transform: scale(1.1); }
        .taska.hacker-celpont { box-shadow: 0 0 30px #22c55e !important; border: 2px solid #22c55e; animation: hacker-pulse 1s infinite alternate;}
        
        @keyframes hacker-pulse { from { transform: scale(1); } to { transform: scale(1.15); box-shadow: 0 0 50px #22c55e; } }

        @keyframes shake-and-flip {
            0% { transform: rotateY(0) translateX(0); } 15% { transform: translateX(-5px) rotateZ(-3deg); }
            30% { transform: translateX(5px) rotateZ(3deg); } 45% { transform: translateX(-5px) rotateZ(-3deg); }
            60% { transform: translateX(0) scale(1.1); } 100% { transform: rotateY(180deg) scale(1); }
        }

        @keyframes peek-flip {
            0% { transform: rotateY(0); }
            20% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 0 30px #10b981; }
            80% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 0 30px #10b981; }
            100% { transform: rotateY(0) scale(1); }
        }

        .taska-front, .taska-hatlap { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5); 
        }
        
        .taska-front { background: linear-gradient(145deg, var(--case-red), var(--case-dark)); border: 2px solid #2a0303; flex-direction: column; overflow: hidden; }
        .taska.rejtelyes .taska-front { background: linear-gradient(145deg, var(--mystery-purple), #2e1065); }
        .taska-front::before { content: ''; position: absolute; top: 0; left: 25%; width: 50%; height: 14px; background: linear-gradient(to bottom, #f3f4f6, #9ca3af); border-radius: 0 0 6px 6px; border: 2px solid #374151; border-top: none; }
        .taska-szam { font-family: 'Orbitron', sans-serif; background: radial-gradient(circle, #fff, #d1d5db); color: #000; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; border: 4px solid #6b7280; box-shadow: 0 5px 10px rgba(0,0,0,0.7), inset 0 3px 5px #fff; }

        .taska-hatlap { background: linear-gradient(145deg, #1f1f1f, #0a0a0a); transform: rotateY(180deg); padding: 8px; box-sizing: border-box; border: 2px solid #333; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .taska.nyitott .taska-hatlap, .taska.animacio-rontgen .taska-hatlap { opacity: 0.95; }
        .taska-osszeg { font-size: clamp(0.8rem, 1.5vw, 1.35rem); font-weight: 900; text-align: center; line-height: 1.1; color: #fca5a5; text-shadow: 2px 2px 5px #000; word-wrap: break-word;}
        
        .taska.sajat-taskam .taska-front { box-shadow: 0 0 35px var(--gold); border: 2px solid var(--gold); animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 15px var(--gold); } 50% { box-shadow: 0 0 45px #ffe066; } 100% { box-shadow: 0 0 15px var(--gold); } }

        .villogo-vegsokattintas { animation: vegsokattintas-pulse 0.8s infinite alternate !important; cursor: pointer !important; z-index: 10; pointer-events: auto !important; }
        .villogo-vegsokattintas .taska-front { border-color: #fff !important; }
        @keyframes vegsokattintas-pulse { 0% { transform: scale(1); box-shadow: 0 0 20px #fff; } 100% { transform: scale(1.15); box-shadow: 0 0 80px #fff, 0 0 30px var(--gold); } }

        .play-again-pulse { color: #ffe066 !important; animation: pulse-gold-text 1.5s infinite; cursor: pointer; text-decoration: underline;}
        @keyframes pulse-gold-text { 0% { text-shadow: 0 0 5px var(--gold); } 50% { text-shadow: 0 0 20px #fff, 0 0 30px var(--gold); } 100% { text-shadow: 0 0 5px var(--gold); } }

        .rejtett { display: none !important; }

        #ajanlat-tortenet { margin-top: 25px; width: 100%; max-width: 800px; background: rgba(0,0,0,0.85); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        #ajanlat-tortenet h3 { text-align: center; margin: 0 0 15px 0; color: var(--gold); font-family: 'Orbitron'; font-size: 1.3rem; text-transform: uppercase; }
        #ajanlat-lista { list-style: none; padding: 0; margin: 0; font-size: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #ajanlat-lista li { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(255,255,255,0.08); border-radius: 6px; border-left: 4px solid #555; }
        .ajanlat-dontes-elutasitva { color: var(--offer-decline); font-weight: bold;} 
        .ajanlat-dontes-elfogadva { color: var(--offer-accept); font-weight: bold; }
        .ajanlat-lista-elfogadva-sor { border-left-color: var(--offer-accept) !important; background: rgba(16, 185, 129, 0.15) !important;}

        /* Konfetti Tűzijáték Effekt */
        #fireworks-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        @media (min-width: 1024px) {
            .jatekterulet { display: grid; grid-template-columns: 280px 1fr 280px; gap: 30px; align-items: flex-start; }
            .penzfa-wrapper { display: contents; }
            #penzfa-bal { grid-column: 1; grid-row: 1; width: 100%; }
            #fő-kontener { grid-column: 2; grid-row: 1; width: 100%; max-width: 100%; overflow: hidden;}
            #penzfa-jobb { grid-column: 3; grid-row: 1; width: 100%; }
            
            .penzfa-elem { padding: 10px 15px; font-size: clamp(0.75rem, 1.5vw, 0.9rem); }
            .logo-container { transform: scale(1); margin-bottom: 20px;}
            #taska-racs { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; }
            .taska-szam { width: 55px; height: 55px; font-size: 2rem; }
            .header-buttons { justify-content: flex-end; }
        }
        @media (max-width: 768px) {
            header { padding-top: 50px; }
            .header-buttons { top: 5px; padding: 0 5px; }
            .header-btn { font-size: 0.65rem; padding: 6px 8px; }
            .header-btn-group { gap: 5px; }
            
            #ajanlat-lista { grid-template-columns: 1fr; }
            #info-flipper { min-height: 220px; } 
            .info-front { padding: 10px; justify-content: center; }
            #uzenetek { font-size: 1.2rem; }
            #kiegeszito-uzenet { font-size: 0.9rem; margin-top: 4px; }
            #bekiabalas { font-size: 0.85rem; line-height: 1.2; margin-top: 4px; }
            #taska-racs { gap: 8px; padding: 5px; }
            .taska-szam { width: 40px; height: 40px; font-size: 1.2rem; }
            #alku-input { width: 120px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-buttons">
                <div class="header-btn-group">
                    <button id="powerup-gomb" class="header-btn" title="Megnézheted 1 zárt táska tartalmát!" disabled>👁️ Röntgen</button>
                    <button id="panik-gomb" class="header-btn" title="Kikényszerít egy azonnali ajánlatot a Bankártól!" disabled>🚨 Pánik</button>
                </div>
                <button id="uj-jatek-gomb" class="header-btn">Új Játék</button>
            </div>
            <div class="logo-container">
                <div class="logo-box">ÁLL</div>
                <div class="logo-box stacked"><span>A</span><span>Z</span></div>
                <div class="logo-box">ALKU</div>
            </div>
            <div class="copyright-info">Copyright &copy; by: Robi <span id="current-year"></span></div>
        </header>

        <div class="jatekterulet">
            <div class="penzfa-wrapper">
                <ul id="penzfa-bal" class="penzfa-kontener"></ul>

            ajanlatTortenet: document.getElementById('ajanlat-tortenet'), ajanlatLista: document.getElementById('ajanlat-lista'),
            ujJatekGomb: document.getElementById('uj-jatek-gomb'), powerupGomb: document.getElementById('powerup-gomb'),
            panikGomb: document.getElementById('panik-gomb')
        };
        
        let gameState = {};
        const NYITASI_SZAMLALO =[6, 5, 4, 3, 2, 1, 1, 1]; 
        const TOTAL_CASES = 24;
        let timeBombInterval = null;

        function formatValuta(ertek) { return new Intl.NumberFormat('hu-HU', { style: 'currency', currency: 'HUF', maximumFractionDigits: 0 }).format(ertek); }
        function formatNyeremeny(ertek) { return typeof ertek === 'number' ? formatValuta(ertek) : ertek; }
        function kever(tomb) { let m = tomb.length, t, i; while(m){i=Math.floor(Math.random()*m--);t=tomb[m];tomb[m]=tomb[i];tomb[i]=t;} return tomb; }
        function getRandomElem(tomb) { return tomb[Math.floor(Math.random() * tomb.length)]; }
        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // Tűzijáték 14+ másodpercig sűrűbben
        function startCelebration() {
            const container = document.createElement('div');
            container.id = 'fireworks-container';
            document.querySelector('.container').appendChild(container);
            const colors = ['#f8b500', '#10b981', '#ef4444', '#3b82f6', '#8b5cf6', '#fff'];
            
            for (let i = 0; i < 300; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = -10 - Math.random() * 20 + 'vh';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                conf.style.animationDuration = (Math.random() * 4 + 4) + 's'; 
                conf.style.animationDelay = (Math.random() * 8) + 's'; 
                
                if (Math.random() > 0.5) conf.style.borderRadius = '50%';
                container.appendChild(conf);
            }
            setTimeout(() => { if(container.parentNode) container.remove(); }, 16000);
        }

        function getTierClass(value) {
            if (value < 1000) return 'prize-tier-joke';
            if (value < 100000) return 'prize-tier-small';
            if (value < 1000000) return 'prize-tier-medium';
            if (value < 10000000) return 'prize-tier-large';
            return 'prize-tier-huge';
        }

        function mutassUzenetet(fő, kiegeszito = "", bekiabalas = "", isPhoneCall = false) {
            DOM.uzenetekSzoveg.innerHTML = fő; 
            
            DOM.kiegeszitoUzenet.innerHTML = kiegeszito; 
            DOM.kiegeszitoUzenet.style.display = kiegeszito ? 'block' : 'none';
            
            DOM.bekiabalas.innerHTML = bekiabalas;
            DOM.bekiabalas.style.display = bekiabalas ? 'block' : 'none';
            
            if (isPhoneCall) DOM.uzenetekKonteer.classList.add('telefon-hivas-aktiv');
            else DOM.uzenetekKonteer.classList.remove('telefon-hivas-aktiv');
        }

        function mutassFlipAjanlat(cim, osszegHTML, leiras, gombok) {
            DOM.backCim.innerHTML = cim; DOM.backOsszeg.innerHTML = osszegHTML; DOM.backLeiras.innerHTML = leiras;
            DOM.backGombokTarolo.innerHTML = '';
            gombok.forEach(g => {
                const btn = document.createElement('button');
                btn.className = `back-gomb ${g.osztaly}`; btn.innerHTML = g.szoveg;
                btn.onclick = () => { g.akcio(); };
                DOM.backGombokTarolo.appendChild(btn);
            });
            DOM.infoFlipper.classList.add('flipped');
        }

        function ujraFlipAjanlat(cim, osszegHTML, leiras, gombok) {
            DOM.infoFlipper.classList.remove('flipped');
            setTimeout(() => { mutassFlipAjanlat(cim, osszegHTML, leiras, gombok); }, 500);
        }

        function rejtFlipAjanlat() {
            DOM.infoFlipper.classList.remove('flipped'); 
            DOM.uzenetekKonteer.classList.remove('telefon-hivas-aktiv');
            if(timeBombInterval) { clearInterval(timeBombInterval); timeBombInterval = null; }
        }

        function generatePrizes() {
            const selected =[];
            const takeFrom = (source, count) => { const shuffled = kever([...source]); for(let i=0; i<count; i++) selected.push(shuffled[i]); };
            selected.push(MASTER_PRIZES.penz[MASTER_PRIZES.penz.length - 1]); selected.push(MASTER_PRIZES.penz[MASTER_PRIZES.penz.length - 2]);
            takeFrom(MASTER_PRIZES.vicc, 2); takeFrom(MASTER_PRIZES.penz.slice(0, 5), 4);
            takeFrom(MASTER_PRIZES.targy.filter(t => t.value < 400000), 2); takeFrom(MASTER_PRIZES.penz.slice(5, 12), 7);
            takeFrom(MASTER_PRIZES.targy.filter(t => t.value >= 400000), 2); takeFrom(MASTER_PRIZES.penz.slice(12, MASTER_PRIZES.penz.length-2), 5);
            return selected.map((p, index) => ({ ...p, uId: index + 1 })).sort((a, b) => a.value - b.value);
        }

        function initGame() {
            const existingFireworks = document.getElementById('fireworks-container');
            if(existingFireworks) existingFireworks.remove();
            if(timeBombInterval) { clearInterval(timeBombInterval); timeBombInterval = null; }

            const nyeremenyek = generatePrizes();
            const initialAverage = nyeremenyek.reduce((a, b) => a + b.value, 0) / nyeremenyek.length;

            gameState = { 
                allapot: 'sajat_valasztas', sajatTaska: null, taskaErtekek: {}, maradekNyeremenyek:[...nyeremenyek], 
                aktualisKor: 0, megNyitando: NYITASI_SZAMLALO[0], offerHistory:[], nyertOsszeg: 0, bonuszPenz: 0,
                marEladta: false, lilaSajat: false, isProcessingClick: false, initialAverage: initialAverage,
                badStreak: 0, goodStreak: 0, elvesztettNagyok: [], hasznaltRontgen: false, isRontgenAktiv: false, rontgenLejart: false,
                hasznaltPanikgomb: false, hasznaltVisszaajanlas: false, voltHacker: false
            };
            
            rejtFlipAjanlat(); 
            DOM.ajanlatTortenet.classList.add('rejtett'); DOM.ajanlatLista.innerHTML = ''; 
            
            DOM.powerupGomb.disabled = false; DOM.powerupGomb.innerHTML = "👁️ Röntgen";
            DOM.panikGomb.disabled = true; DOM.panikGomb.innerHTML = "🚨 Pánik";
            
            mutassUzenetet("Kezdődik a játék!", "Kattints arra a táskára, amit hazavinnél!");
            const getIcon = (ny) => ny.type === 'targy' ? '🎁' : (ny.type === 'vicc' ? '🤡' : '💰');
            
            DOM.penzfaBal.innerHTML = nyeremenyek.slice(0, 12).map(ny => `<li data-uid="${ny.uId}" class="penzfa-elem aktiv bal-oldal ${getTierClass(ny.value)}"><span class="tipus-icon">${getIcon(ny)}</span> <span class="prize-text">${ny.display}</span></li>`).join('');
            DOM.penzfaJobb.innerHTML = nyeremenyek.slice(12).map(ny => `<li data-uid="${ny.uId}" class="penzfa-elem aktiv jobb-oldal ${getTierClass(ny.value)}"><span class="prize-text">${ny.display}</span> <span class="tipus-icon">${getIcon(ny)}</span></li>`).join('');
            
            DOM.taskaRacs.innerHTML = ''; const kevertNyeremenyek = kever([...nyeremenyek]); const rejtelyesId = Math.floor(Math.random() * TOTAL_CASES) + 1;
            
            for (let i = 1; i <= TOTAL_CASES; i++) {
                gameState.taskaErtekek[i] = kevertNyeremenyek[i - 1]; const taskaElem = document.createElement('div');
                taskaElem.className = 'taska' + (i === rejtelyesId ? ' rejtelyes' : ''); taskaElem.dataset.taskaId = i;
                taskaElem.innerHTML = `<div class="taska-front"><div class="taska-szam">${i}</div></div><div class="taska-hatlap"><div class="taska-osszeg">${kevertNyeremenyek[i-1].display}</div></div>`;
                taskaElem.addEventListener('click', () => handleTaskaClick(i)); DOM.taskaRacs.appendChild(taskaElem);
            }
        }

        // PÁNIKGOMB LOGIKA
        DOM.panikGomb.addEventListener('click', async () => {
            if (gameState.hasznaltPanikgomb || gameState.allapot !== 'nyitogatas' || gameState.marEladta || gameState.isProcessingClick) return;
            
            gameState.hasznaltPanikgomb = true;
            DOM.panikGomb.disabled = true;
            DOM.panikGomb.innerHTML = "🚨 Használva";
            gameState.isProcessingClick = true;

            mutassUzenetet("PÁNIKGOMB AKTIVÁLVA!", "Megállítottad a játékot! A Bankár AZONNAL ad egy ajánlatot!", "Azonnali Hívás...", true);
            await wait(3500);
            
            const ajanlatErtek = calculateBankerOffer();
            bankarAjanlatotTesz(ajanlatErtek, null, true); // true = panic mode
        });

        DOM.powerupGomb.addEventListener('click', () => {
            if (gameState.hasznaltRontgen || gameState.rontgenLejart || gameState.allapot === 'sajat_valasztas' || gameState.allapot === 'vegsokattintas') return;
            if (gameState.isProcessingClick) return;
            
            gameState.isRontgenAktiv = true;
            DOM.powerupGomb.disabled = true;
            DOM.powerupGomb.innerHTML = "👁️ Használva";
            
            mutassUzenetet("RÖNTGEN SZEMÜVEG AKTÍV!", "Kattints egy zárt táskára, hogy 2 másodpercre meglásd mi van benne!", "De vigyázz, a táska utána VISSZAZÁRUL és bent marad a játékban!");
            document.querySelectorAll('.taska:not(.nyitott):not(.sajat-taskam)').forEach(t => t.classList.add('rontgen-celpont'));
        });

        async function handleTaskaClick(id) {
            if (gameState.isProcessingClick) return;
            const taskaElem = document.querySelector(`.taska[data-taska-id='${id}']`);
            
            if (gameState.allapot === 'vegsokattintas') {
                if (id == gameState.sajatTaska) { gameState.isProcessingClick = true; await kinyitVegsoTaska(id); } 
                else { mutassUzenetet("Kattints a SAJÁT táskádra!", "Már csak ez az egy maradt hátra."); }
                return;
            }

            if (!taskaElem || taskaElem.classList.contains('nyitott') || taskaElem.classList.contains('sajat-taskam')) return;

            gameState.isProcessingClick = true;

            if (gameState.isRontgenAktiv) {
                document.querySelectorAll('.taska').forEach(t => t.classList.remove('rontgen-celpont'));
                gameState.isRontgenAktiv = false;
                gameState.hasznaltRontgen = true;
                
                taskaElem.classList.add('animacio-rontgen');
                mutassUzenetet("👁️ Röntgen bekapcsolva...", "Lássuk mi lapul bent!");
                
                await wait(2500); 
                taskaElem.classList.remove('animacio-rontgen');
                
                mutassUzenetet("Röntgen kikapcsolva!", "Az infót megjegyezted. Jöhet a folytatás!", "A táska visszazárult.");
                await wait(2000);
                
                frissitNyitasiSzoveg();
                gameState.isProcessingClick = false;
                return;
            }

            if (gameState.allapot === 'szabad_csere') {
                document.querySelector(`.taska[data-taska-id='${gameState.sajatTaska}']`).classList.remove('sajat-taskam');
                gameState.sajatTaska = id;
                taskaElem.classList.add('sajat-taskam');
                mutassUzenetet("Sikeres csere!", `Az új táskád a(z) ${id}. lett! A játék folytatódik.`);
                rogzitAjanlat(`Szabad Csere (${id}. táskára)`, 'Elfogadva');
                gameState.allapot = 'nyitogatas';
                setTimeout(folytatNyitasUtan, 3000);
                return;
            }

            if (gameState.allapot === 'sajat_valasztas') {
                gameState.sajatTaska = id; taskaElem.classList.add('sajat-taskam'); 
                DOM.panikGomb.disabled = false; // Pánikgomb aktiválása saját táska választás után
                
                const valasztottSzoveg = `A(z) ${id}. táska a tiéd!`;
                if (taskaElem.classList.contains('rejtelyes')) {
                    gameState.lilaSajat = true; mutassUzenetet("A LILA TÁSKÁT VÁLASZTOTTAD!", valasztottSzoveg, "A Bankár retteg ettől! Minden ajánlat magasabb lesz!");
                } else { mutassUzenetet("Kiváló! Jöhet a nyitogatás!", valasztottSzoveg); }
                
                await wait(2500); gameState.allapot = 'nyitogatas'; frissitNyitasiSzoveg(); gameState.isProcessingClick = false;
            } else if (gameState.allapot === 'nyitogatas' || gameState.allapot === 'alku_elfogadva_kijatszas') {
                await kinyitTaska(id); 
            }
        }

        async function kinyitTaska(id) {
            const taskaElem = document.querySelector(`.taska[data-taska-id='${id}']`);
            const nyeremeny = gameState.taskaErtekek[id];
            
            // HACKER EVENT (csak játékban lévőnél, kb 12% esély, ha még nem volt)
            if (!gameState.marEladta && !gameState.voltHacker && gameState.maradekNyeremenyek.length > 8 && Math.random() < 0.12) {
                gameState.voltHacker = true;
                DOM.uzenetekKonteer.classList.add('hacker-glitch');
                
                const topPrizes = gameState.maradekNyeremenyek.slice(-4);
                const closedCases = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).filter(t => t.dataset.taskaId != gameState.sajatTaska && t.dataset.taskaId != id);
                let hackTarget = null;
                
                for(let c of closedCases) {
                    let cVal = gameState.taskaErtekek[c.dataset.taskaId].value;
                    if(topPrizes.some(p => p.value === cVal)) { hackTarget = c; break; }
                }
                
                if (hackTarget) {
                    mutassUzenetet("RENDSZER MEGHACKELVE", `A(z) ${hackTarget.dataset.taskaId}. táskában ÓRIÁSI ÖSSZEG VAN!`, "NE NYISD KI!!");
                    hackTarget.classList.add('hacker-celpont');
                    await wait(3500);
                    hackTarget.classList.remove('hacker-celpont');
                    DOM.uzenetekKonteer.classList.remove('hacker-glitch');
                    mutassUzenetet("Kapcsolat helyreállt...", "A játék folytatódik.");
                    await wait(1500);
                } else {
                    DOM.uzenetekKonteer.classList.remove('hacker-glitch');
                }
            }

            taskaElem.classList.add('animacio-nyitas'); mutassUzenetet("Feszültség...", "Nyílik a táska...");
            await wait(1200); taskaElem.classList.remove('animacio-nyitas'); taskaElem.classList.add('nyitott'); 
            document.querySelector(`li[data-uid='${nyeremeny.uId}']`).classList.replace('aktiv', 'kiesett');
            
            gameState.maradekNyeremenyek = gameState.maradekNyeremenyek.filter(n => n.uId !== nyeremeny.uId);
            
            const newAtlag = gameState.maradekNyeremenyek.reduce((a, b) => a + b.value, 0) / gameState.maradekNyeremenyek.length;
            const boardHealth = newAtlag / gameState.initialAverage;
            
            let isLargeOut = (nyeremeny.value >= 1000000 || nyeremeny.value > newAtlag * 1.5);
            let főUzenet = "";
            let bekiabalas = "";

            if (!gameState.marEladta) {
                if (isLargeOut) {
                    gameState.badStreak++; gameState.goodStreak = 0;
                    if (nyeremeny.value >= 10000000) gameState.elvesztettNagyok.push(nyeremeny.display);
                    főUzenet = "Fájdalmas!"; if (nyeremeny.type === 'targy') főUzenet = "Oda a luxus!";
                } else {
                    gameState.goodStreak++; gameState.badStreak = 0;
                    főUzenet = "Szuper!"; if (nyeremeny.type === 'vicc') főUzenet = "Szemét a kukában!";
                }

                const specificTaunt = SPECIFIC_TAUNTS[nyeremeny.display];
                
                if (gameState.badStreak >= 3) {
                    bekiabalas = getRandomElem(BANKER_STREAK_BAD);
                } else if (gameState.goodStreak >= 3) {
                    bekiabalas = getRandomElem(BANKER_STREAK_GOOD);
                } else if (isLargeOut && gameState.elvesztettNagyok.length >= 2 && nyeremeny.value >= 10000000) {
                    let elozoNagy = gameState.elvesztettNagyok[gameState.elvesztettNagyok.length - 2];
                    let comboTemplate = getRandomElem(BIG_LOSS_COMBO_TAUNTS);
                    bekiabalas = comboTemplate.replace('{elozo}', elozoNagy).replace('{mostani}', nyeremeny.display);
                } else if (specificTaunt && Math.random() < 0.5) {
                    bekiabalas = specificTaunt;
                } else if (Math.random() < 0.15) {
                    bekiabalas = getRandomElem(BLUFF_TAUNTS);
                } else {
                    if (boardHealth > 1.2) {
                        bekiabalas = isLargeOut ? "Huh... Végre! A Bankár egy picit fellélegzett a hatalmas kieső láttán." : getRandomElem(BANKER_NEUTRAL_GOOD_TAUNTS);
                    } else if (boardHealth < 0.8) {
                        bekiabalas = isLargeOut ? getRandomElem(BANKER_NEUTRAL_BAD_TAUNTS) : "Na végre egy jó hír neked is... de a táblád attól még borzalmas!";
                    } else {
                        bekiabalas = isLargeOut ? getRandomElem(BANKER_NEUTRAL_BAD_TAUNTS) : getRandomElem(BANKER_NEUTRAL_GOOD_TAUNTS);
                    }
                }
            } else {
                if (isLargeOut) {
                    főUzenet = getRandomElem(["Megkönnyebbülés!", "Huh, ez meleg volt!", "Szerencse, hogy már eladtad!", "Ezt megúsztad!"]);
                    bekiabalas = getRandomElem([
                        "A Bankár a fejét veri a falba, túl sokat fizetett neked!",
                        "Zseniális alku volt! A milliók a süllyesztőben!",
                        "A Bankár dühöng a vezérlőben: 'Miért adtam neki annyi pénzt?!'",
                        "A Bankár most jött rá, hogy csúnyán átverted!",
                        "Kiváló döntés volt kiszállni, a tábla most omlott össze!"
                    ]);
                } else {
                    főUzenet = getRandomElem(["Ajjaj...", "A nagy pénz még mindig bent van...", "Kezdhetsz izgulni!", "Egyre nő a táskád értéke..."]);
                    bekiabalas = getRandomElem([
                        "A Bankár röhög: 'Kezded már bánni, hogy eladtad?'",
                        "Lehet, hogy gombokért adtad el a fődíjat? A Bankár mosolyog!",
                        "A Bankár elégedett: tudja, hogy a te táskád sokkal többet ér!",
                        "Hatalmas hiba volt eladni? Hamarosan kiderül!",
                        "A Bankár dörzsöli a tenyerét. Túljárt az eszeden!"
                    ]);
                }
            }

            mutassUzenetet(főUzenet, `${nyeremeny.display} volt benne.`, bekiabalas);
            await wait(2500);

            if (taskaElem.classList.contains('rejtelyes') && !gameState.lilaSajat) {
                mutassUzenetet("LILA LÁTNOK BÓNUSZ!", "Megláthatod a jövőt (max 3 millióig)!", "", true); await wait(2500);
                const zartElemek = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).filter(t => t.dataset.taskaId != gameState.sajatTaska);
                let peekCélok = zartElemek.filter(t => gameState.taskaErtekek[t.dataset.taskaId].value <= 3000000);
                if (peekCélok.length === 0) peekCélok = zartElemek; 
                if (peekCélok.length > 0) {
                    const peekElem = getRandomElem(peekCélok); peekElem.classList.add('nyitott'); await wait(3000); peekElem.classList.remove('nyitott');
                    mutassUzenetet("A jövőbe láttál...", "Használd okosan az infót!"); await wait(2000);
                }
            }

            let triggerSoronKivuli = false;
            let soronKivuliTipus = "";

            if (gameState.megNyitando > 1 && !gameState.marEladta) {
                if (isLargeOut && Math.random() < 0.25) {
                    triggerSoronKivuli = true;
                    soronKivuliTipus = (boardHealth < 0.8) ? "cinikus" : "vicces";
                } else if (!isLargeOut && boardHealth > 1.3 && Math.random() < 0.20) {
                    triggerSoronKivuli = true;
                    soronKivuliTipus = "rendkivuli";
                }
            }

            if (triggerSoronKivuli) {
                await wait(1000);
                bankarSoronKivuli(nyeremeny, soronKivuliTipus);
                return; 
            }

            folytatNyitasUtan();
        }

        async function folytatNyitasUtan() {
            gameState.megNyitando--;
            if (gameState.megNyitando > 0) { 
                frissitNyitasiSzoveg(); 
                gameState.isProcessingClick = false; 
            } else { 
                await kiertekelKorVege(); 
            }
        }

        function frissitNyitasiSzoveg() {
            const prefix = gameState.marEladta ? "[KIJÁTSZÁS] " : "";
            mutassUzenetet(`${prefix}Még ${gameState.megNyitando} táskát nyiss ki.`, `Saját táskád: ${gameState.sajatTaska}`);
        }

        async function bankarSoronKivuli(kiesoNyeremeny, tipus) {
            mutassUzenetet("A BANKÁR KÖZBESZÓL!", "Megcsörrent a telefon soron kívül!", "", true);
            await wait(3500);

            let alapAjanlat = calculateBankerOffer();
            
            if (tipus === "cinikus") {
                let cinikusAjanlat = Math.round((alapAjanlat * (Math.random() * 0.05 + 0.01)) / 100) * 100;
                if (cinikusAjanlat < 100) cinikusAjanlat = 100;
                
                let leiras = `Látom, kiment a(z) <b>${kiesoNyeremeny.display}</b>! A Bankár jót nevet rajtad, és felajánl egy kis aprót vigaszdíjnak buszjegyre...<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
                
                mutassFlipAjanlat("CINIKUS AJÁNLAT", formatValuta(cinikusAjanlat), leiras,[
                    { szoveg: "Ezt komolyan gondolja?! Elfogadom...", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(cinikusAjanlat, "Cinikus Bankár") },
                    { szoveg: "Kinevetem és megyek tovább!", osztaly: "btn-elutasit", akcio: () => elutasitSoronKivuli(cinikusAjanlat, "Cinikus Bankár") }
                ]);
            } else if (tipus === "vicces") {
                let viccesTargy = getRandomElem(BANKER_SURPRISE_JOKES);
                let leiras = `Kiment a(z) <b>${kiesoNyeremeny.display}</b>! A Bankár kárörvendve felajánlja neked ezt a "nagyszerű" vigaszdíjat!<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, a játék véget ér!)</span>`;
                
                mutassFlipAjanlat("VIGASZDÍJ?", viccesTargy, leiras,[
                    { szoveg: "Jobb, mint a semmi...", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(viccesTargy, "Vigaszdíj") },

        async function kiertekelKorVege(isPanicMode = false) {
            const maradekZartSzam = document.querySelectorAll('.taska:not(.nyitott)').length;
            if (maradekZartSzam === 1) {
                gameState.allapot = 'vegsokattintas'; document.querySelector(`.taska[data-taska-id='${gameState.sajatTaska}']`).classList.add('villogo-vegsokattintas');
                mutassUzenetet("A VÉGSŐ PILLANAT!", "Kattints rá, és derítsük ki végre, hogy mi volt nálad végig!");
                gameState.isProcessingClick = false; return;
            }
            if (maradekZartSzam === 2) { finalShowdown(); return; }

            const atlagErtek = gameState.maradekNyeremenyek.reduce((a, b) => a + b.value, 0) / gameState.maradekNyeremenyek.length;
            const boardHealth = atlagErtek / gameState.initialAverage;

            if (!isPanicMode) {
                let phoneSub = "Figyeld az ajánlatot...";
                if (boardHealth > 1.2) { phoneSub = "A Bankár remegő hangon hívott... Nagyon szabadulna tőled!"; } 
                else if (boardHealth < 0.8) { phoneSub = "A Bankár röhögve hívott... Lássuk, mit kínál a gombokért!"; }

                mutassUzenetet("Csendet kérek! Csörög a telefon...", phoneSub, "", true); await wait(3500);
            }
            
            const ajanlatErtek = calculateBankerOffer();
            
            if (gameState.marEladta) {
                let text = "Ezt az összeget ajánlotta volna most a Bankár.";
                mutassFlipAjanlat("MI LETT VOLNA HA...", formatValuta(ajanlatErtek), text,[
                    { szoveg: "Tovább a kijátszáshoz", osztaly: "btn-vegso", akcio: () => { 
                        mutassUzenetet("Kijátszás folytatódik...", "Lássuk mi maradt!"); 
                        rejtFlipAjanlat(); 
                        setTimeout(kovetkezoKor, 400); 
                    }}
                ]);
                return;
            }

            if (isPanicMode) { bankarAjanlatotTesz(ajanlatErtek, null, true); return; }

            const twistEsely = Math.random(); let valasztottTwist = null;
            if (twistEsely < 0.70) { 
                const availableTwists =['idozitett_bomba']; // Új twist bevezetve
                if (gameState.aktualisKor <= 4) availableTwists.push('sugo', 'sugo');
                if (gameState.aktualisKor >= 2 && gameState.aktualisKor <= 5) availableTwists.push('kombo', 'ot_koteg', 'felezo_duplazo', 'vak_csere_penzzel', 'szerencsekerek', 'szabad_csere', 'idozitett_bomba');
                if (gameState.aktualisKor >= 3 && gameState.aktualisKor <= 6) availableTwists.push('vak_alku', 'rulett', 'harom_doboz', 'targy_csomag', 'szabad_csere', 'idozitett_bomba');
                if (availableTwists.length > 0) valasztottTwist = getRandomElem(availableTwists);
            }

            switch(valasztottTwist) {
                case 'sugo': bankarSugo(); break;
                case 'idozitett_bomba': bankarIdozitettBomba(ajanlatErtek); break;
                case 'ot_koteg': bankarOtKotegAjanlat(ajanlatErtek); break;
                case 'rulett': bankarRulettAjanlat(ajanlatErtek); break;
                case 'vak_alku': bankarVakAlkuTesz(ajanlatErtek * 1.4); break;
                case 'felezo_duplazo': bankarFelezoDuplazo(ajanlatErtek); break;
                case 'harom_doboz': bankarHaromDoboz(ajanlatErtek); break;
                case 'targy_csomag': bankarTargyCsomag(ajanlatErtek); break;
                case 'vak_csere_penzzel': bankarVakCserePenzzel(ajanlatErtek); break;
                case 'szabad_csere': bankarSzabadCsere(ajanlatErtek); break;
                case 'szerencsekerek': bankarSzerencsekerek(ajanlatErtek); break;
                case 'kombo': 
                    const poenok = gameState.maradekNyeremenyek.filter(n => n.type === 'vicc' || (n.type === 'targy' && n.value < 100000));
                    if (poenok.length > 0) { bankarAjanlatotTesz(ajanlatErtek, getRandomElem(poenok).display); } 
                    else { bankarAjanlatotTesz(ajanlatErtek); }
                    break;
                default: bankarAjanlatotTesz(ajanlatErtek); break;
            }
        }

        function calculateBankerOffer() {
            const maradekDb = gameState.maradekNyeremenyek.length;
            const atlag = gameState.maradekNyeremenyek.reduce((a, b) => a + b.value, 0) / maradekDb;
            const maxVal = Math.max(...gameState.maradekNyeremenyek.map(n => n.value));
            const progress = gameState.aktualisKor / (NYITASI_SZAMLALO.length - 1); 
            let percentage = 0.15 + (progress * 0.75); 
            if (maxVal > atlag * 3 && maradekDb <= 5) percentage *= 0.85; 
            percentage = percentage * (0.95 + (Math.random() * 0.1)); 
            if (gameState.lilaSajat) percentage *= 1.25;

            let ajanlatAlap = atlag * percentage; let vegleges = 0;
            if (ajanlatAlap > 1000000) vegleges = Math.round(ajanlatAlap / 10000) * 10000;
            else if (ajanlatAlap > 10000) vegleges = Math.round(ajanlatAlap / 1000) * 1000;
            else vegleges = Math.round(ajanlatAlap / 100) * 100;

            if (vegleges < 100) vegleges = 100; return vegleges;
        }

            if (kisTaskak.length > 0) {
                const id = getRandomElem(kisTaskak).dataset.taskaId;
                mutassUzenetet("Bankári Súgó:", `A Bankár megsúgta: a(z) ${id}. táskában biztosan aprópénz vagy kacat van!`, "Kiváló célpont a következő nyitáshoz!", true);
                await wait(5000); DOM.uzenetekKonteer.classList.remove('telefon-hivas-aktiv');
                bankarAjanlatotTesz(calculateBankerOffer());
            } else { bankarAjanlatotTesz(calculateBankerOffer()); }
        }

                                }}
                            ]);
                        }
                    }));
                    ujraFlipAjanlat("VÁLASSZ EGY DOBOZT!", "Melyik legyen?", "", gombok);
                }},
                { szoveg: "Nem kérem!", osztaly: "btn-elutasit", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(alapAjanlat, 'elutasit');
                }}
            ]);
        }

        function bankarTargyCsomag(alapAjanlat) {
            const targyak = gameState.maradekNyeremenyek.filter(n => n.type === 'targy' || n.type === 'vicc');
            if (targyak.length < 3) { bankarAjanlatotTesz(alapAjanlat); return; }
            const csomag = kever(targyak).slice(0, 3).map(t => t.display).join(" ÉS ");
            let leiras = `A Bankár felajánl egy csomagot: <br><b>${csomag}</b>!<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
            mutassFlipAjanlat("TÁRGYHALMOZÓ!", "Nincs pénz!", leiras,[
                { szoveg: "Áll az Alku!", osztaly: "btn-elfogad", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Adminisztráció..."); rejtFlipAjanlat();
                    alkuKezelese(csomag, 'elfogad', null, "Tárgycsomag");
                }},
                { szoveg: "Inkább a pénz kéne...", osztaly: "btn-elutasit", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(alapAjanlat, 'elutasit');
                }}
            ]);
        }

        function bankarVakCserePenzzel(alapAjanlat) {
            const zartElemek = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).filter(t => t.dataset.taskaId != gameState.sajatTaska);
            const ujTaskaId = getRandomElem(zartElemek).dataset.taskaId;
            const reszPenz = Math.round((alapAjanlat * 0.4)/1000)*1000;
            let leiras = `Ad ennyi pénzt zsebbe, DE elcseréli a táskád a(z) ${ujTaskaId}. táskára!<br><span style='color:#fca5a5; font-weight:bold;'>(A játék utána folytatódik!)</span>`;
            
            mutassFlipAjanlat("VAK CSERE PÉNZZE!", formatValuta(reszPenz), leiras,[
                { szoveg: "Pénz zsebbe és Csere!", osztaly: "btn-elfogad", akcio: () => {
                    mutassUzenetet(`BÓNUSZ MEGSZEREZVE: ${formatValuta(reszPenz)}`, `Táskák kicserélve! A játék folytatódik.`); rejtFlipAjanlat();
                    document.querySelector(`.taska[data-taska-id='${gameState.sajatTaska}']`).classList.remove('sajat-taskam');
                    gameState.sajatTaska = ujTaskaId; document.querySelector(`.taska[data-taska-id='${ujTaskaId}']`).classList.add('sajat-taskam');
                    gameState.bonuszPenz += reszPenz; 
                    rogzitAjanlat(`Vak Csere + ${formatValuta(reszPenz)}`, 'Elfogadva');
                    setTimeout(kovetkezoKor, 3000);
                }},
                { szoveg: "Ezt nem vállalom!", osztaly: "btn-elutasit", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(alapAjanlat, 'elutasit');
                }}
            ]);
        }

        function bankarSzerencsekerek(alapAjanlat) {
            let leiras = `Pörgetünk! Szorzók: 0.5x, 1x, 1.5x, 2x, 3x!<br><span style='color:#fca5a5; font-weight:bold;'>(A kipörgetett összeg lesz a végleges nyereményed!)</span>`;
            mutassFlipAjanlat("SZERENCSEKERÉK", formatValuta(alapAjanlat), leiras,[
                { szoveg: "Pörgessük meg!", osztaly: "btn-elfogad", akcio: async () => {
                    mutassUzenetet("Szerencsekerék pörgetése...", "Mi lesz a szorzó?"); rejtFlipAjanlat();
                    const szorzok =[0.5, 1, 1.5, 2, 3]; 
                    let porgetesek = 15;
                    while(porgetesek > 0) {
                        let tempSzorzo = getRandomElem(szorzok);
                        mutassUzenetet("Szerencsekerék pörög...", `${tempSzorzo}x ?`, ""); await wait(100 + (15 - porgetesek) * 20); porgetesek--;
                    }
                    const nyertSzorzo = getRandomElem(szorzok);
                    const vegsOsszeg = Math.round((alapAjanlat * nyertSzorzo)/1000)*1000;
                    ujraFlipAjanlat(`A KERÉK MEGÁLLT: ${nyertSzorzo}x`, formatValuta(vegsOsszeg), "Ez a végső nyereményed!",[
                        { szoveg: "Tovább a Kijátszáshoz", osztaly: "btn-vegso", akcio: () => { 
                            mutassUzenetet("Döntés rögzítve!", "Lássuk mi volt a sajátodban!"); rejtFlipAjanlat(); 
                            alkuKezelese(vegsOsszeg, 'elfogad', null, `Kerék (${nyertSzorzo}x)`); 
                        }}
                    ]);
                }},
                { szoveg: "Nem kockáztatok!", osztaly: "btn-elutasit", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(alapAjanlat, 'elutasit');
                }}
            ]);
        }

        function bankarRulettAjanlat(alapAjanlat) {
            let leiras = `Pörgetünk! FELE, NORMÁL, vagy DUPLÁJA!<br><span style='color:#fca5a5; font-weight:bold;'>(AMIN MEGÁLL, AZ LESZ A VÉGLEGES NYEREMÉNYED!)</span>`;
            mutassFlipAjanlat("BANKÁR RULETT", formatValuta(alapAjanlat), leiras,[
                { szoveg: "Megpörgetem az alkut!", osztaly: "btn-elfogad", akcio: async () => {
                    rejtFlipAjanlat();
                    const opciok =[ { szorzo: 0.5, szoveg: "A FELE (50%)" }, { szorzo: 1, szoveg: "Normál (100%)" }, { szorzo: 2, szoveg: "A DUPLÁJA (200%)" } ];
                    
                    let spinning = true; let stopping = false; let duration = 0; let stopTime = 0; let delay = 30; let currentIndex = 0; let startTime = Date.now();

                    mutassUzenetet("Készülj a megállításra!", `<button id="stop-rulett-btn" class="stop-btn">STOP</button>`, "");
                    const stopBtn = document.getElementById('stop-rulett-btn');

                    stopBtn.addEventListener('click', () => {
                        if (!stopping) { stopping = true; duration = Math.random() * 5000 + 5000; stopTime = Date.now() + duration; stopBtn.style.display = 'none'; DOM.kiegeszitoUzenet.innerHTML = "<span style='color: #facc15; font-weight:bold; font-size: 1.2rem;'>Lassulás...</span>"; DOM.kiegeszitoUzenet.style.display = 'block'; }
                    });

                    while (spinning) {
                        currentIndex = (currentIndex + 1) % opciok.length;
                        DOM.uzenetekSzoveg.innerHTML = `<span style="font-size: clamp(1.5rem, 3.5vw, 2.5rem); color: #fff; text-shadow: 0 0 15px var(--gold);">${opciok[currentIndex].szoveg}</span>`;
                        if (!stopping && Date.now() - startTime > 15000) stopBtn.click();
                        if (stopping) {
                            let remaining = stopTime - Date.now();
                            if (remaining <= 0) { spinning = false; break; }
                            let progress = 1 - (remaining / duration); delay = 30 + Math.pow(progress, 2.5) * 800; 
                        }
                        await wait(delay);
                    }

                    const finalOpt = opciok[currentIndex]; const vegsOsszeg = Math.round((alapAjanlat * finalOpt.szorzo) / 1000) * 1000;
                    DOM.uzenetekSzoveg.innerHTML = `<span style="font-size: clamp(1.5rem, 3.5vw, 2.5rem); color: #10b981; text-shadow: 0 0 15px #10b981;">${finalOpt.szoveg}</span>`;
                    DOM.kiegeszitoUzenet.innerHTML = "A Rulett megállt!"; await wait(2000);
                    
                    ujraFlipAjanlat("KIPÖRGETVE: " + finalOpt.szoveg, formatValuta(vegsOsszeg), "Ez a tiéd!",[
                        { szoveg: "Tovább a Kijátszáshoz", osztaly: "btn-vegso", akcio: () => { 
                            mutassUzenetet("Döntés rögzítve!", "Lássuk mi volt a sajátodban!"); rejtFlipAjanlat(); alkuKezelese(vegsOsszeg, 'elfogad', null, `Rulett (${finalOpt.szoveg})`); 
                        }}
                    ]);
                }},
                { szoveg: "Túl veszélyes, elutasít!", osztaly: "btn-elutasit", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(alapAjanlat, 'elutasit');
                }}
            ]);
        }

        function bankarVakAlkuTesz(vakErtek) {
            let leiras = `A bankár nem árulja el az összeget. Elfogadod vakon?<br><span style='color:#fca5a5; font-weight:bold;'>(Ez a rejtett összeg lesz a végleges nyereményed!)</span>`;
            mutassFlipAjanlat("VAK ALKU!", "??? Ft", leiras,[
                { szoveg: "Áll az alku vakon!", osztaly: "btn-elfogad", akcio: async () => {
                    mutassUzenetet("Vak alku kibontása...", "Lássuk mennyit ért!", ""); rejtFlipAjanlat(); await wait(2000);
                    let kerekitett = Math.round(vakErtek/1000)*1000; alkuKezelese(kerekitett, 'elfogad', null, "Vak Alku");
                }},
                { szoveg: "Nem kockáztatok!", osztaly: "btn-elutasit", akcio: async () => {
                    mutassUzenetet("Boríték kibontása...", "Mit dobtál el?", ""); rejtFlipAjanlat(); await wait(2000);
                    let kerekitett = Math.round(vakErtek/1000)*1000; rogzitAjanlat(`Vak Alku`, 'Elutasítva');
                    mutassUzenetet(`Ezt buktad!`, `A Vak Alku valójában ${formatValuta(kerekitett)} volt!`); setTimeout(kovetkezoKor, 4000);
                }}
            ]);
        }

        function alkuKezelese(ajanlatErtek, dontes, pluszTargy = null, specialisNev = null) {
            if (dontes === 'elfogad') {
                gameState.nyertOsszeg = ajanlatErtek; gameState.marEladta = true;
                DOM.panikGomb.disabled = true; // Pánik off
                
                let historySzoveg = formatNyeremeny(ajanlatErtek); let uzenetKiegeszites = "";
                if (pluszTargy) { historySzoveg += ` + ${pluszTargy}`; uzenetKiegeszites = ` Plusz nyertél egy: ${pluszTargy}!`; }
                if (specialisNev) historySzoveg = `${specialisNev}: ${historySzoveg}`;

                rogzitAjanlat(historySzoveg, 'Elfogadva'); gameState.allapot = 'alku_elfogadva_kijatszas';
                mutassUzenetet(`ÁLL AZ ALKU! Megnyerted ezt: ${formatNyeremeny(ajanlatErtek)}!${uzenetKiegeszites}`, `De a játék megy tovább. Lássuk a kijátszást!`);
                setTimeout(kovetkezoKor, 4500);
            } else {
                rogzitAjanlat(formatValuta(ajanlatErtek), 'Elutasítva');
                mutassUzenetet("Nincs alku!", "Megyünk tovább. Bátor döntés!"); setTimeout(kovetkezoKor, 2000);
            }
        }

        async function kovetkezoKor() {
            gameState.aktualisKor++; 
            gameState.megNyitando = NYITASI_SZAMLALO[gameState.aktualisKor] || 1;
            gameState.isProcessingClick = false;
            
            if (gameState.aktualisKor === 3 && !gameState.hasznaltRontgen && !gameState.rontgenLejart) {
                gameState.rontgenLejart = true;
                DOM.powerupGomb.disabled = true;
                DOM.powerupGomb.innerHTML = "👁️ Lejárt";
                mutassUzenetet("A Bankár letiltotta a Röntgent!", "Túl késő, a szemüveg lejárt! Nincs több segítség.");
                await wait(3500);
            }
            
            frissitNyitasiSzoveg(); 
        }

        function finalShowdown() {
            const maradekTaskak = Array.from(document.querySelectorAll('.taska:not(.nyitott)'));
            const masikTaskaElem = maradekTaskak.find(t => t.dataset.taskaId != gameState.sajatTaska);
            const masikId = masikTaskaElem.dataset.taskaId;
            DOM.panikGomb.disabled = true; // Pánik off

            const ertek1 = gameState.taskaErtekek[gameState.sajatTaska]; const ertek2 = gameState.taskaErtekek[masikId];
            const vegsoAjanlat = Math.round(((ertek1.value + ertek2.value) / 2 * 0.95) / 1000) * 1000;

            if (gameState.marEladta) {
                mutassFlipAjanlat("MI LETT VOLNA HA...", formatValuta(vegsoAjanlat), `A Bankár utolsó ajánlata ez lett volna. Már csak a sajátod (${gameState.sajatTaska}) és a(z) ${masikId}. maradt.`,[
                    { szoveg: "Utolsó táska kinyitása!", osztaly: "btn-vegso", akcio: () => {
                        mutassUzenetet("Kijátszás utolsó lépése!", `Kérlek, nyisd ki az idegen táskát (${masikId}.)!`);
                        rejtFlipAjanlat(); gameState.allapot = 'alku_elfogadva_kijatszas'; gameState.megNyitando = 1; gameState.isProcessingClick = false;
                    }}
                ]);
                return;
            } 
            
            // CSERE GOMB ELTÁVOLÍTVA a kiskapu bezárása miatt!
            mutassFlipAjanlat("AZ UTOLSÓ DÖNTÉS", formatValuta(vegsoAjanlat), `Itt a vége. Kéred a bankár utolsó ajánlatát, VAGY kinyitod a sajátodat (${gameState.sajatTaska}.)?`,[
                { szoveg: `Sajátomat (${gameState.sajatTaska})!`, osztaly: "btn-elutasit", akcio: () => befejezesKezelese(null, 'Tartás', gameState.sajatTaska) },
                { szoveg: "Pénzt kérem!", osztaly: "btn-elfogad", akcio: () => befejezesKezelese(vegsoAjanlat, 'Pénz', gameState.sajatTaska) }
            ]);
        }

        function befejezesKezelese(elfogadottPenz, tipus, vegsoTaskaId) {
            mutassUzenetet("Döntés rögzítve!", "Lássuk az utolsó táskákat!"); rejtFlipAjanlat(); rogzitAjanlat(tipus === 'Pénz' ? formatValuta(elfogadottPenz) : tipus, 'Végleges');
            
            if (elfogadottPenz) {
                gameState.nyertOsszeg = elfogadottPenz; gameState.marEladta = true;
                mutassUzenetet(`ELFOGADTAD A PÉNZT! Nyereményed: ${formatValuta(elfogadottPenz)}!`, "A játék utolsó lépése... nyisd ki a másikat!");
            } else { mutassUzenetet("SAJÁT TÁSKA!", `Bátor döntés! Nyisd ki az utolsó idegen táskát!`); }

            gameState.allapot = 'nyitogatas'; gameState.megNyitando = 1; gameState.isProcessingClick = false;
        }

        // ÚJ: FEKETE TÁSKA LOGIKA (Végjáték után)
        async function kinyitVegsoTaska(id) {
            const taskaElem = document.querySelector(`.taska[data-taska-id='${id}']`);
            taskaElem.classList.remove('villogo-vegsokattintas'); taskaElem.classList.add('animacio-nyitas');
            mutassUzenetet("A VÉGSŐ IGAZSÁG...", "Lássuk, mi volt nálad végig!"); await wait(1500);
            taskaElem.classList.remove('animacio-nyitas'); taskaElem.classList.add('nyitott');

            const nyeremeny = gameState.taskaErtekek[id];
            
            let baseWinnings = gameState.marEladta ? gameState.nyertOsszeg : nyeremeny.value;
            let isNumeric = typeof baseWinnings === 'number';
            let currentTotal = (isNumeric ? baseWinnings : 0) + gameState.bonuszPenz;

            // Ha van pénz, bedobjuk a Fekete Táskát!
            if (currentTotal > 0) {
                await wait(2000);
                mutassUzenetet("VÁRJ CSAK...", "Mi ez itt?", "A stúdió elsötétül...", true);
                await wait(3000);
                
                let feketeLeiras = `A játék ugyan véget ért, de a Bankár küldött még valamit... <b>Egy Fekete Táskát!</b><br>Kockáztatsz az eddigi nyereményeddel (${formatValuta(currentTotal)})?<br>A táskában lehet: <span style="color:#10b981">2x, 1.5x</span>, de lehet <span style="color:#ef4444">0.5x, vagy 0x (MINDENT ELVESZTESZ)</span> is!`;
                
                mutassFlipAjanlat("A FEKETE TÁSKA", "Kinyitod?", feketeLeiras, [
                    { szoveg: "KINYITOM! KOCKÁZTATOK!", osztaly: "btn-fekete", akcio: async () => {
                        rejtFlipAjanlat();
                        mutassUzenetet("FEKETE TÁSKA NYÍLIK...", "Vajon mi lesz a szorzó?", "");
                        await wait(3000);
                        
                        const multipliers = [2, 1.5, 0.5, 0];
                        const multi = getRandomElem(multipliers);
                        currentTotal = Math.round(currentTotal * multi);
                        
                        let txt = "";
                        if(multi >= 1.5) txt = `ZSENIÁLIS! A szorzó ${multi}x lett! Az új nyereményed: ${formatValuta(currentTotal)}!`;
                        else if(multi === 0.5) txt = `AUCS! A szorzó 0.5x lett! A nyereményed megfeleződött: ${formatValuta(currentTotal)}.`;
                        else txt = `TRAGÉDIA! A szorzó 0x lett! MINDENT ELVESZTETTÉL! A Bankár röhögve távozik!`;
                        
                        ujraFlipAjanlat(`SZORZÓ: ${multi}x`, formatValuta(currentTotal), txt, [
                            { szoveg: "Értékelés", osztaly: "btn-vegso", akcio: () => { rejtFlipAjanlat(); vegkifejletKiirasa(currentTotal, nyeremeny, isNumeric, baseWinnings); }}
                        ]);
                    }},
                    { szoveg: "Nem nyitom, elég a pénz!", osztaly: "btn-elfogad", akcio: () => {
                        rejtFlipAjanlat();
                        vegkifejletKiirasa(currentTotal, nyeremeny, isNumeric, baseWinnings);
                    }}
                ]);
            } else {
                vegkifejletKiirasa(currentTotal, nyeremeny, isNumeric, baseWinnings);
            }
        }

        function vegkifejletKiirasa(finalTotal, sajatNyeremeny, isNumeric, baseWinnings) {
            let finalString = "";
            if (isNumeric) {
                finalString = `A VÉGLEGES NYEREMÉNY: ${formatValuta(finalTotal)}!`;
            } else { 
                 let itemName = gameState.marEladta ? gameState.nyertOsszeg : sajatNyeremeny.display;
                 if (finalTotal > 0) finalString = `A nyeremény ${itemName} + bónusz összeg: ${formatValuta(finalTotal)}!`;
                 else finalString = `A nyeremény: ${itemName}!`;
            }

            let choiceEval = "";
            let baseValToCompare = isNumeric ? baseWinnings : (typeof gameState.nyertOsszeg === 'number' ? gameState.nyertOsszeg : 0);
            if (gameState.marEladta) {
                if (sajatNyeremeny.value > baseValToCompare) choiceEval = `A táskád többet ért (${sajatNyeremeny.display}), óriási hiba volt eladni!`;
                else choiceEval = `Zseniális döntés volt eladni, a táskában csak ${sajatNyeremeny.display} volt!`;
            } else { choiceEval = "Megmentetted a saját táskád a végéig!"; }

            let isBigWin = finalTotal >= 1000000;
            let isEpicWin = finalTotal >= 5000000; 
            
            let endMessage = "";
            if (isEpicWin) { endMessage = getRandomElem(EPIC_WIN_MESSAGES); startCelebration(); } 
            else if (isBigWin) { endMessage = getRandomElem(HAPPY_ENDINGS); } 
            else { endMessage = getRandomElem(SAD_ENDINGS); }
            
            let ctaHtml = `<br><br><span class="play-again-pulse" onclick="document.getElementById('uj-jatek-gomb').click()">Nincs még vége! Kattints ide, és toljunk le egy újabb kört! 😉</span>`;

            mutassUzenetet(finalString, `${choiceEval} ${endMessage} ${ctaHtml}`);
            gameState.isProcessingClick = true; 
        }

        function rogzitAjanlat(ajanlatSzoveg, dontes) {
            gameState.offerHistory.push({ round: gameState.aktualisKor, offer: ajanlatSzoveg, decision: dontes });
            DOM.ajanlatTortenet.classList.remove('rejtett');
            DOM.ajanlatLista.innerHTML = gameState.offerHistory.map(h => {
                let decisionClass = (h.decision === 'Elfogadva' || h.decision === 'Végleges') ? 'ajanlat-dontes-elfogadva' : 'ajanlat-dontes-elutasitva';
                let liClass = (h.decision === 'Elfogadva' || h.decision === 'Végleges') ? 'ajanlat-lista-elfogadva-sor' : '';
                return `<li class="${liClass}"><span>${h.round}. kör: ${h.offer}</span> <span class="${decisionClass}">${h.decision}</span></li>`;
            }).join('');
        }

        DOM.ujJatekGomb.addEventListener('click', () => { if (confirm("Biztosan új játékot kezdesz?")) initGame(); });
        initGame();
    </script>
</body>
</html
