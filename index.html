<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áll az Alku - Végleges TV Kiadás (Kijátszás & Bankári Extrák)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Roboto:wght@400;700;900&display=swap');

        :root {
            --gold: #f8b500; --gold-light: #fceabb;
            --case-red: #a01010; --case-dark: #4a0505;
            --text-light: #f3f4f6; --offer-accept: #10b981;
            --offer-decline: #ef4444; --mystery-purple: #8b5cf6;
        }

        body {
            font-family: 'Roboto', sans-serif; 
            background-color: #5c0002;
            background-image: 
                radial-gradient(circle at 50% 50%, #2b0000 2%, transparent 3%),
                linear-gradient(45deg, rgba(0,0,0,0.4) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.4) 75%),
                linear-gradient(-45deg, rgba(0,0,0,0.4) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.4) 75%);
            background-size: 60px 60px; color: var(--text-light); margin: 0; padding: 10px; min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden; user-select: none;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.95);
        }

        .container { max-width: 1600px; margin: 0 auto; width: 100%; flex-grow: 1; display: flex; flex-direction: column; }
        
        header { display: flex; flex-direction: column; align-items: center; padding-bottom: 10px; margin-bottom: 15px; position: relative; }

        .logo-container {
            display: inline-flex; align-items: stretch; background: #000; padding: 4px;
            border: 2px solid #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px var(--gold);
            margin-bottom: 10px; transform: scale(0.9);
        }

        .logo-box {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold), #c99300); color: #000;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.5rem;
            padding: 5px 20px; display: flex; align-items: center; justify-content: center;
            letter-spacing: 2px; text-transform: uppercase; text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }
        
        .logo-box.stacked {
            flex-direction: column; font-size: 1.2rem; padding: 2px 10px; line-height: 1.1;
            letter-spacing: 0; border-left: 5px solid #000; border-right: 5px solid #000;
        }

        .header-buttons { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 100; }

        #uj-jatek-gomb {
            background: linear-gradient(to bottom, var(--gold), #966e00);
            color: black; border: 2px solid #fff; border-radius: 8px; padding: 10px 20px; 
            font-weight: 900; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: all 0.2s; 
        }
        #uj-jatek-gomb:hover { transform: translateY(-2px); box-shadow: 0 5px 25px var(--gold); }

        #powerup-gomb {
            background: linear-gradient(to bottom, #10b981, #047857);
            color: white; border: 2px solid #fff; border-radius: 8px; padding: 10px 15px; 
            font-weight: 900; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: all 0.2s; animation: pulse-green 2s infinite;
        }
        #powerup-gomb:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 25px #10b981; }
        #powerup-gomb:disabled { background: linear-gradient(to bottom, #444, #222); color: #888; border-color: #555; animation: none; cursor: not-allowed; box-shadow: none; transform: none; }

        @keyframes pulse-green { 0% { box-shadow: 0 0 5px #10b981; } 50% { box-shadow: 0 0 20px #34d399; } 100% { box-shadow: 0 0 5px #10b981; } }

        .copyright-info { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; color: rgba(255, 255, 255, 0.6); text-shadow: 2px 2px 4px #000; text-align: center;}

        .jatekterulet { display: flex; flex-direction: column; gap: 15px; width: 100%; flex-grow: 1; }
        
        #penzfa-kontenerek { display: flex; justify-content: space-between; width: 100%; }
        .penzfa-kontener { list-style: none; padding: 0; margin: 0; width: 48%; display: flex; flex-direction: column; gap: 4px; }
        .penzfa-elem { 
            padding: 8px 12px; border-radius: 4px; text-align: right; font-weight: 900; 
            transition: all 0.5s ease; font-family: 'Roboto', sans-serif; font-size: clamp(0.75rem, 1.5vw, 0.9rem); 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.8);
            box-shadow: 0 3px 6px rgba(0,0,0,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .penzfa-elem .tipus-icon { opacity: 0.8; font-size: 1.1em; flex-shrink: 0; }
        
        .penzfa-elem.aktiv { background: linear-gradient(90deg, #b48600 0%, #ffd700 100%); color: #000; }
        .penzfa-elem.aktiv.jobb-oldal { background: linear-gradient(90deg, #ffd700 0%, #b48600 100%); }
        .penzfa-elem.kiesett { background: #1a1a1a; color: #444; text-decoration: line-through; opacity: 0.6; border-color: #000; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }

        #fő-kontener { display: flex; flex-direction: column; align-items: center; width: 100%; flex-grow: 1; position: relative; max-width: 100%; overflow: hidden;}
        
        #informacios-sav-kontener { perspective: 1200px; margin-bottom: 25px; width: 100%; }
        #info-flipper { 
            width: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d; min-height: 200px;
        }
        #info-flipper.flipped { transform: rotateX(180deg); }
        
        .info-front, .info-back { 
            backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; box-sizing: border-box; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); text-align: center;
        }
        
        .info-front { 
            width: 100%; height: 100%; padding: 15px;
            background: linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0.9), rgba(0,0,0,0.7)); 
            border: 2px solid rgba(212, 175, 55, 0.5); 
        }
        
        .info-back { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 10px; overflow: hidden;
            background: linear-gradient(145deg, #3a0000, #150000, #3a0000); 
            border: 3px solid var(--gold); transform: rotateX(180deg); 
            justify-content: center; gap: 4px;
        }

        #uzenetek { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 900; color: var(--gold-light); display: flex; justify-content: center; align-items: center; text-shadow: 1px 1px 3px #000; text-align: center;}
        #kiegeszito-uzenet { font-size: clamp(0.9rem, 2vw, 1.2rem); color: #cbd5e1; margin-top: 8px;}
        #bekiabalas { font-size: clamp(1rem, 2.5vw, 1.3rem); color: #fca5a5; font-weight: 900; margin-top: 8px; font-style: italic; text-shadow: 1px 1px 2px #000;}

        .telefon-ikon { display: none; font-size: 3.5rem; margin-right: 15px; filter: drop-shadow(0 0 15px #ff0000); }
        .telefon-hivas-aktiv .telefon-ikon { display: inline-block; animation: ringing 0.2s infinite; }
        .telefon-hivas-aktiv #uzenetek-szoveg { color: #ff4444 !important; text-shadow: 0 0 15px #ff0000; font-size: 1.8rem;}
        .telefon-hivas-aktiv.info-front { animation: pulse-red-border 0.6s infinite alternate; }

        @keyframes pulse-red-border {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000 inset, 0 5px 25px rgba(255,0,0,0.6); }
            100% { border-color: #aa0000; box-shadow: 0 0 5px #aa0000 inset, 0 5px 15px rgba(0,0,0,0.8); }
        }
        @keyframes ringing {
            0% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(25deg) scale(1.2); }
            50% { transform: rotate(-25deg) scale(1.2); } 75% { transform: rotate(25deg) scale(1.2); }
            100% { transform: rotate(0deg) scale(1); }
        }

        #back-cim { margin: 0; font-size: clamp(1rem, 2vw, 1.3rem); color: #fca5a5; font-family: 'Orbitron'; text-transform: uppercase; letter-spacing: 2px;}
        #back-osszeg { font-size: clamp(1.5rem, 3.5vw, 2.5rem); font-weight: 900; color: var(--gold-light); font-family: 'Orbitron'; margin: 5px 0; text-shadow: 0 0 15px var(--gold); }
        #back-leiras { font-size: clamp(0.75rem, 1.2vw, 0.95rem); color: #e5e7eb; margin-bottom: 8px; line-height: 1.3; }

        .back-gombok { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 5px;}
        .back-gomb {
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(0.75rem, 1.5vw, 0.9rem); text-transform: uppercase;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .btn-elfogad { background: linear-gradient(145deg, var(--offer-accept), #047857); color: white; border: 2px solid #34d399;}
        .btn-elutasit { background: linear-gradient(145deg, var(--offer-decline), #991b1b); color: white; border: 2px solid #f87171;}
        .btn-vegso { background: linear-gradient(145deg, var(--gold), #b48600); color: black; border: 2px solid #fef08a;}
        .btn-koteg { background: linear-gradient(145deg, #1e3a8a, #172554); color: white; border: 2px solid #60a5fa;}
        .btn-extra { background: linear-gradient(145deg, #7c3aed, #4c1d95); color: white; border: 2px solid #c4b5fd;}
        
        .back-gomb:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.7); }
        .back-gomb:active { transform: translateY(2px); }
        
        .stop-btn {
            background: linear-gradient(to bottom, #ff4444, #aa0000); color: white; padding: 10px 30px; font-size: 1.5rem;
            border: 2px solid white; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; 
            margin-top: 15px; box-shadow: 0 0 15px #ff0000; transition: transform 0.1s, box-shadow 0.2s;
        }
        .stop-btn:hover { box-shadow: 0 0 25px #ff0000; }
        .stop-btn:active { transform: scale(0.95); }

        #taska-racs { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); 
            gap: 12px; width: 100%; perspective: 1200px; padding: 10px; max-width: 950px; justify-content: center;
        }
        .taska { position: relative; aspect-ratio: 1.15 / 1; transform-style: preserve-3d; cursor: pointer; transition: transform 0.2s; }
        .taska:hover:not(.nyitott) { transform: translateY(-5px) scale(1.05); }
        .taska.animacio-nyitas { animation: shake-and-flip 1.2s ease-in-out forwards; pointer-events: none; }
        .taska.nyitott { transform: rotateY(180deg); pointer-events: none; }
        
        .taska.animacio-rontgen { animation: peek-flip 2.5s ease-in-out forwards; pointer-events: none; }
        .taska.rontgen-celpont:hover { box-shadow: 0 0 20px #10b981; transform: scale(1.1); }

        @keyframes shake-and-flip {
            0% { transform: rotateY(0) translateX(0); } 15% { transform: translateX(-5px) rotateZ(-3deg); }
            30% { transform: translateX(5px) rotateZ(3deg); } 45% { transform: translateX(-5px) rotateZ(-3deg); }
            60% { transform: translateX(0) scale(1.1); } 100% { transform: rotateY(180deg) scale(1); }
        }

        @keyframes peek-flip {
            0% { transform: rotateY(0); }
            20% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 0 30px #10b981; }
            80% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 0 30px #10b981; }
            100% { transform: rotateY(0) scale(1); }
        }

        .taska-front, .taska-hatlap { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5); 
        }
        
        .taska-front { background: linear-gradient(145deg, var(--case-red), var(--case-dark)); border: 2px solid #2a0303; flex-direction: column; overflow: hidden; }
        .taska.rejtelyes .taska-front { background: linear-gradient(145deg, var(--mystery-purple), #2e1065); }
        .taska-front::before { content: ''; position: absolute; top: 0; left: 25%; width: 50%; height: 14px; background: linear-gradient(to bottom, #f3f4f6, #9ca3af); border-radius: 0 0 6px 6px; border: 2px solid #374151; border-top: none; }
        .taska-szam { font-family: 'Orbitron', sans-serif; background: radial-gradient(circle, #fff, #d1d5db); color: #000; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; border: 4px solid #6b7280; box-shadow: 0 5px 10px rgba(0,0,0,0.7), inset 0 3px 5px #fff; }

        .taska-hatlap { background: linear-gradient(145deg, #1f1f1f, #0a0a0a); transform: rotateY(180deg); padding: 8px; box-sizing: border-box; border: 2px solid #333; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .taska.nyitott .taska-hatlap, .taska.animacio-rontgen .taska-hatlap { opacity: 0.95; }
        .taska-osszeg { font-size: clamp(0.8rem, 1.5vw, 1.35rem); font-weight: 900; text-align: center; line-height: 1.1; color: #fca5a5; text-shadow: 2px 2px 5px #000; word-wrap: break-word;}
        
        .taska.sajat-taskam .taska-front { box-shadow: 0 0 35px var(--gold); border: 2px solid var(--gold); animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 15px var(--gold); } 50% { box-shadow: 0 0 45px #ffe066; } 100% { box-shadow: 0 0 15px var(--gold); } }

        .villogo-vegsokattintas { animation: vegsokattintas-pulse 0.8s infinite alternate !important; cursor: pointer !important; z-index: 10; pointer-events: auto !important; }
        .villogo-vegsokattintas .taska-front { border-color: #fff !important; }
        @keyframes vegsokattintas-pulse { 0% { transform: scale(1); box-shadow: 0 0 20px #fff; } 100% { transform: scale(1.15); box-shadow: 0 0 80px #fff, 0 0 30px var(--gold); } }

        .play-again-pulse { color: #ffe066 !important; animation: pulse-gold-text 1.5s infinite; cursor: pointer; text-decoration: underline;}
        @keyframes pulse-gold-text { 0% { text-shadow: 0 0 5px var(--gold); } 50% { text-shadow: 0 0 20px #fff, 0 0 30px var(--gold); } 100% { text-shadow: 0 0 5px var(--gold); } }

        #ajanlat-tortenet { margin-top: 25px; width: 100%; max-width: 800px; background: rgba(0,0,0,0.85); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        #ajanlat-tortenet h3 { text-align: center; margin: 0 0 15px 0; color: var(--gold); font-family: 'Orbitron'; font-size: 1.3rem; text-transform: uppercase; }
        #ajanlat-lista { list-style: none; padding: 0; margin: 0; font-size: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #ajanlat-lista li { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(255,255,255,0.08); border-radius: 6px; border-left: 4px solid #555; }
        .ajanlat-dontes-elutasitva { color: var(--offer-decline); font-weight: bold;} 
        .ajanlat-dontes-elfogadva { color: var(--offer-accept); font-weight: bold; }
        .ajanlat-lista-elfogadva-sor { border-left-color: var(--offer-accept) !important; background: rgba(16, 185, 129, 0.15) !important;}

        @media (min-width: 1024px) {
            .jatekterulet { flex-direction: row; gap: 30px; align-items: flex-start; }
            .penzfa-kontener { width: 280px; }
            .penzfa-elem { padding: 10px 15px; }
            .logo-container { transform: scale(1); margin-bottom: 20px;}
            #taska-racs { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; }
            .taska-szam { width: 55px; height: 55px; font-size: 2rem; }
        }
        @media (max-width: 768px) {
            header { padding-top: 50px; }
            .header-buttons { top: 5px; right: 5px; flex-direction: column; gap: 5px; }
            #uj-jatek-gomb, #powerup-gomb { font-size: 0.7rem; padding: 6px 10px; }
            #ajanlat-lista { grid-template-columns: 1fr; }
            
            #info-flipper { min-height: 180px; } 
            .info-front { padding: 10px; justify-content: center; }
            #uzenetek { font-size: 1.2rem; }
            #kiegeszito-uzenet { font-size: 0.9rem; margin-top: 4px; }
            #bekiabalas { font-size: 0.85rem; line-height: 1.2; margin-top: 4px; }
            #taska-racs { gap: 8px; padding: 5px; }
            .taska-szam { width: 40px; height: 40px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-buttons">
                <button id="powerup-gomb" title="Megnézheted 1 zárt táska tartalmát (csak a 3. kör végéig)!" disabled>👁️ Röntgen</button>
                <button id="uj-jatek-gomb">Új Játék</button>
            </div>
            <div class="logo-container">
                <div class="logo-box">ÁLL</div>
                <div class="logo-box stacked"><span>A</span><span>Z</span></div>
                <div class="logo-box">ALKU</div>
            </div>
            <div class="copyright-info">Copyright &copy; by: Robi <span id="current-year"></span></div>
        </header>

        <div class="jatekterulet">
            <ul id="penzfa-bal" class="penzfa-kontener"></ul>
            
            <div id="fő-kontener">
                <div id="informacios-sav-kontener">
                    <div id="info-flipper">
                        <div class="info-front" id="info-front-lap">
                            <span id="uzenetek"><span class="telefon-ikon">☎️</span><span id="uzenetek-szoveg">Betöltés...</span></span>
                            <span id="kiegeszito-uzenet" style="display:none;"></span>
                            <span id="bekiabalas" style="display:none;"></span>
                        </div>
                        <div class="info-back" id="info-back-lap">
                            <h3 id="back-cim">A Bankár Ajánlata</h3>
                            <div id="back-osszeg">0 Ft</div>
                            <div id="back-leiras">Garantált összeg.</div>
                            <div class="back-gombok" id="back-gombok-tarolo"></div>
                        </div>
                    </div>
                </div>
                
                <div id="taska-racs"></div>
                
                <div id="ajanlat-tortenet" class="rejtett">
                    <h3>Bankári Előzmények</h3>
                    <ul id="ajanlat-lista"></ul>
                </div>
            </div>
            
            <ul id="penzfa-jobb" class="penzfa-kontener"></ul>
        </div>
    </div>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        const MASTER_PRIZES = {
            penz:[ 100, 1000, 5000, 10000, 25000, 50000, 100000, 250000, 500000, 750000, 1000000, 1500000, 2500000, 3000000, 5000000, 7500000, 10000000, 15000000, 20000000, 25000000, 50000000, 100000000 ].map(v => ({display: formatValuta(v), value: v, type: 'penz'})),
            targy:[ 
                { display: 'Páros Mozijegy', value: 8000, type: 'targy' }, { display: 'Kávéfőző', value: 20000, type: 'targy' },
                { display: 'Robotporszívó', value: 90000, type: 'targy' }, { display: 'Hőlégballonozás', value: 120000, type: 'targy' },
                { display: 'Kondibérlet', value: 150000, type: 'targy' }, { display: 'Túró Rudi (Életre)', value: 200000, type: 'targy' },
                { display: 'Roller', value: 250000, type: 'targy' }, { display: 'Wellness hétvége', value: 400000, type: 'targy' },
                { display: 'Gamer PC', value: 800000, type: 'targy' }, { display: 'Karibi Utazás', value: 3500000, type: 'targy' },
                { display: 'Traktor', value: 5000000, type: 'targy' }, { display: 'Sportkocsi', value: 10000000, type: 'targy' },
                { display: 'Repülőgép', value: 15000000, type: 'targy' }, { display: 'Új Autó', value: 20000000, type: 'targy' }, 
                { display: 'Arany WC', value: 25000000, type: 'targy' }, { display: 'Kastély', value: 30000000, type: 'targy' },
                { display: 'Tengeralattjáró', value: 40000000, type: 'targy' }, { display: 'Sziget', value: 50000000, type: 'targy' }
            ],
            vicc:[ 
                { display: 'Lejárt lottószelvény', value: 0, type: 'vicc' }, { display: 'Használt rágó', value: 1, type: 'vicc' }, 
                { display: 'Kilyukadt lufi', value: 1, type: 'vicc' }, { display: 'Két balos kesztyű', value: 2, type: 'vicc' },
                { display: 'Lyukas zokni', value: 2, type: 'vicc' }, { display: 'Labubu figura', value: 3, type: 'vicc' }, 
                { display: 'Zsebszösz gyűjtemény', value: 3, type: 'vicc' }, { display: 'Fél pár papucs', value: 4, type: 'vicc' }, 
                { display: 'Laci bácsi fakanala', value: 5, type: 'vicc' }, { display: 'Egymillió... pengő', value: 5, type: 'vicc' },
                { display: 'Szakadt gumiabroncs', value: 5, type: 'vicc' }, { display: 'Leeresztett úszógumi', value: 10, type: 'vicc' }, 
                { display: 'Gumicsirke', value: 10, type: 'vicc' }, { display: 'Műfogsor', value: 10, type: 'vicc' }, 
                { display: 'Plüss patkány', value: 50, type: 'vicc' }, { display: 'Műanyag Dínó', value: 100, type: 'vicc' }, 
                { display: 'Láthatatlan köpeny', value: 100, type: 'vicc' }, { display: 'Tavalyi naptár', value: 200, type: 'vicc' },
                { display: 'Bólogató kutya', value: 250, type: 'vicc' }, { display: 'Kukoricacsutka', value: 300, type: 'vicc' },

            const selected =[];
            const takeFrom = (source, count) => { const shuffled = kever([...source]); for(let i=0; i<count; i++) selected.push(shuffled[i]); };
            selected.push(MASTER_PRIZES.penz[MASTER_PRIZES.penz.length - 1]); selected.push(MASTER_PRIZES.penz[MASTER_PRIZES.penz.length - 2]);
            takeFrom(MASTER_PRIZES.vicc, 2); takeFrom(MASTER_PRIZES.penz.slice(0, 5), 4);

            return selected.map((p, index) => ({ ...p, uId: index + 1 })).sort((a, b) => a.value - b.value);

            if (gameState.isProcessingClick) return;
            const taskaElem = document.querySelector(`.taska[data-taska-id='${id}']`);
            
            // A végső táskára kattintást még azelőtt ellenőrizzük, hogy a 'sajat-taskam' miatt kilépne!
            if (gameState.allapot === 'vegsokattintas') {
                if (id == gameState.sajatTaska) { gameState.isProcessingClick = true; await kinyitVegsoTaska(id); } 
                else { mutassUzenetet("Kattints a SAJÁT táskádra!", "Már csak ez az egy maradt hátra."); }
                return;
            }

            if (!taskaElem || taskaElem.classList.contains('nyitott') || taskaElem.classList.contains('sajat-taskam')) return;

            gameState.isProcessingClick = true;

            // Ha Röntgen aktív
            if (gameState.isRontgenAktiv) {
                document.querySelectorAll('.taska').forEach(t => t.classList.remove('rontgen-celpont'));
                gameState.isRontgenAktiv = false;
                gameState.hasznaltRontgen = true;
                
                taskaElem.classList.add('animacio-rontgen');
                mutassUzenetet("👁️ Röntgen bekapcsolva...", "Lássuk mi lapul bent!");
                
                await wait(2500); 
                taskaElem.classList.remove('animacio-rontgen');
                
                mutassUzenetet("Röntgen kikapcsolva!", "Az infót megjegyezted. Jöhet a folytatás!", "A táska visszazárult.");
                await wait(2000);
                
                frissitNyitasiSzoveg();
                gameState.isProcessingClick = false;
                return;
            }

            if (gameState.allapot === 'szabad_csere') {
                document.querySelector(`.taska[data-taska-id='${gameState.sajatTaska}']`).classList.remove('sajat-taskam');
                gameState.sajatTaska = id;
                taskaElem.classList.add('sajat-taskam');
                mutassUzenetet("Sikeres csere!", `Az új táskád a(z) ${id}. lett! A játék folytatódik.`);
                rogzitAjanlat(`Szabad Csere (${id}. táskára)`, 'Elfogadva');
                gameState.allapot = 'nyitogatas';
                setTimeout(folytatNyitasUtan, 3000);
                return;
            }

            if (gameState.allapot === 'sajat_valasztas') {
                gameState.sajatTaska = id; taskaElem.classList.add('sajat-taskam'); 
                const valasztottSzoveg = `A(z) ${id}. táska a tiéd!`;
                if (taskaElem.classList.contains('rejtelyes')) {
                    gameState.lilaSajat = true; mutassUzenetet("A LILA TÁSKÁT VÁLASZTOTTAD!", valasztottSzoveg, "A Bankár retteg ettől! Minden ajánlat magasabb lesz!");
                } else { mutassUzenetet("Kiváló! Jöhet a nyitogatás!", valasztottSzoveg); }
                
                await wait(2500); gameState.allapot = 'nyitogatas'; frissitNyitasiSzoveg(); gameState.isProcessingClick = false;
            } else if (gameState.allapot === 'nyitogatas' || gameState.allapot === 'alku_elfogadva_kijatszas') {
                await kinyitTaska(id); 
            }
        }

        async function kinyitTaska(id) {
            const taskaElem = document.querySelector(`.taska[data-taska-id='${id}']`);
            const nyeremeny = gameState.taskaErtekek[id];
            taskaElem.classList.add('animacio-nyitas'); mutassUzenetet("Feszültség...", "Nyílik a táska...");
            await wait(1200); taskaElem.classList.remove('animacio-nyitas'); taskaElem.classList.add('nyitott'); 
            document.querySelector(`li[data-uid='${nyeremeny.uId}']`).classList.replace('aktiv', 'kiesett');
            
            gameState.maradekNyeremenyek = gameState.maradekNyeremenyek.filter(n => n.uId !== nyeremeny.uId);
            
            const newAtlag = gameState.maradekNyeremenyek.reduce((a, b) => a + b.value, 0) / gameState.maradekNyeremenyek.length;
            const boardHealth = newAtlag / gameState.initialAverage;
            
            let isLargeOut = (nyeremeny.value >= 1000000 || nyeremeny.value > newAtlag * 1.5);
            let főUzenet = "";
            let bekiabalas = "";

            if (!gameState.marEladta) {
                // --- JÁTÉKBAN VAGYUNK MÉG ---
                if (isLargeOut) {
                    gameState.badStreak++; gameState.goodStreak = 0;
                    if (nyeremeny.value >= 10000000) gameState.elvesztettNagyok.push(nyeremeny.display);
                    főUzenet = "Fájdalmas!"; if (nyeremeny.type === 'targy') főUzenet = "Oda a luxus!";
                } else {
                    gameState.goodStreak++; gameState.badStreak = 0;
                    főUzenet = "Szuper!"; if (nyeremeny.type === 'vicc') főUzenet = "Szemét a kukában!";
                }

                // Intelligens Szövegelés (Még játékban)
                const specificTaunt = SPECIFIC_TAUNTS[nyeremeny.display];
                
                if (gameState.badStreak >= 3) {
                    bekiabalas = getRandomElem(BANKER_STREAK_BAD);
                } else if (gameState.goodStreak >= 3) {
                    bekiabalas = getRandomElem(BANKER_STREAK_GOOD);
                } else if (isLargeOut && gameState.elvesztettNagyok.length >= 2 && nyeremeny.value >= 10000000) {
                    let elozoNagy = gameState.elvesztettNagyok[gameState.elvesztettNagyok.length - 2];
                    let comboTemplate = getRandomElem(BIG_LOSS_COMBO_TAUNTS);
                    bekiabalas = comboTemplate.replace('{elozo}', elozoNagy).replace('{mostani}', nyeremeny.display);
                } else if (specificTaunt && Math.random() < 0.5) {
                    bekiabalas = specificTaunt;
                } else if (Math.random() < 0.15) {
                    bekiabalas = getRandomElem(BLUFF_TAUNTS);
                } else {
                    if (boardHealth > 1.2) {
                        bekiabalas = isLargeOut ? "Huh... Végre! A Bankár egy picit fellélegzett a hatalmas kieső láttán." : getRandomElem(BANKER_NEUTRAL_GOOD_TAUNTS);
                    } else if (boardHealth < 0.8) {
                        bekiabalas = isLargeOut ? getRandomElem(BANKER_NEUTRAL_BAD_TAUNTS) : "Na végre egy jó hír neked is... de a táblád attól még borzalmas!";
                    } else {
                        bekiabalas = isLargeOut ? getRandomElem(BANKER_NEUTRAL_BAD_TAUNTS) : getRandomElem(BANKER_NEUTRAL_GOOD_TAUNTS);
                    }
                }
            } else {
                // --- KIJÁTSZÁS (Már eladta a táskát) ---
                // Itt a pszichológia megfordul! Ha nagy esik ki, az jó a játékosnak (mert nem nála volt). Ha kicsi, az rossz.
                if (isLargeOut) {
                    főUzenet = getRandomElem(["Megkönnyebbülés!", "Huh, ez meleg volt!", "Szerencse, hogy már eladtad!", "Ezt megúsztad!"]);
                    bekiabalas = getRandomElem([
                        "A Bankár a fejét veri a falba, túl sokat fizetett neked!",
                        "Zseniális alku volt! A milliók a süllyesztőben!",
                        "A Bankár dühöng a vezérlőben: 'Miért adtam neki annyi pénzt?!'",
                        "A Bankár most jött rá, hogy csúnyán átverted!",
                        "Kiváló döntés volt kiszállni, a tábla most omlott össze!"
                    ]);
                } else {
                    főUzenet = getRandomElem(["Ajjaj...", "A nagy pénz még mindig bent van...", "Kezdhetsz izgulni!", "Egyre nő a táskád értéke..."]);
                    bekiabalas = getRandomElem([
                        "A Bankár röhög: 'Kezded már bánni, hogy eladtad?'",
                        "Lehet, hogy gombokért adtad el a fődíjat? A Bankár mosolyog!",
                        "A Bankár elégedett: tudja, hogy a te táskád sokkal többet ér!",
                        "Hatalmas hiba volt eladni? Hamarosan kiderül!",
                        "A Bankár dörzsöli a tenyerét. Túljárt az eszeden!"
                    ]);
                }
            }

            mutassUzenetet(főUzenet, `${nyeremeny.display} volt benne.`, bekiabalas);
            await wait(2500);

            // Lila Bónusz 3 millióig
            if (taskaElem.classList.contains('rejtelyes') && !gameState.lilaSajat) {
                mutassUzenetet("LILA LÁTNOK BÓNUSZ!", "Megláthatod a jövőt (max 3 millióig)!", "", true); await wait(2500);
                const zartElemek = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).filter(t => t.dataset.taskaId != gameState.sajatTaska);
                let peekCélok = zartElemek.filter(t => gameState.taskaErtekek[t.dataset.taskaId].value <= 3000000);
                if (peekCélok.length === 0) peekCélok = zartElemek; 
                if (peekCélok.length > 0) {
                    const peekElem = getRandomElem(peekCélok); peekElem.classList.add('nyitott'); await wait(3000); peekElem.classList.remove('nyitott');
                    mutassUzenetet("A jövőbe láttál...", "Használd okosan az infót!"); await wait(2000);
                }
            }

            // SORON KÍVÜLI KÍSÉRTÉS LOGIKA
            let triggerSoronKivuli = false;
            let soronKivuliTipus = "";

            if (gameState.megNyitando > 1 && !gameState.marEladta) {
                if (isLargeOut && Math.random() < 0.25) {
                    triggerSoronKivuli = true;
                    soronKivuliTipus = (boardHealth < 0.8) ? "cinikus" : "vicces";
                } else if (!isLargeOut && boardHealth > 1.3 && Math.random() < 0.20) {
                    triggerSoronKivuli = true;
                    soronKivuliTipus = "rendkivuli";
                }
            }

            if (triggerSoronKivuli) {
                await wait(1000);
                bankarSoronKivuli(nyeremeny, soronKivuliTipus);
                return; 
            }

            folytatNyitasUtan();
        }

        async function folytatNyitasUtan() {
            gameState.megNyitando--;
            if (gameState.megNyitando > 0) { 
                frissitNyitasiSzoveg(); 
                gameState.isProcessingClick = false; 
            } else { 
                await kiertekelKorVege(); 
            }
        }

        function frissitNyitasiSzoveg() {
            const prefix = gameState.marEladta ? "[KIJÁTSZÁS] " : "";
            mutassUzenetet(`${prefix}Még ${gameState.megNyitando} táskát nyiss ki.`, `Saját táskád: ${gameState.sajatTaska}`);
        }

        async function bankarSoronKivuli(kiesoNyeremeny, tipus) {
            mutassUzenetet("A BANKÁR KÖZBESZÓL!", "Megcsörrent a telefon soron kívül!", "", true);
            await wait(3500);

            let alapAjanlat = calculateBankerOffer();
            
            if (tipus === "cinikus") {
                let cinikusAjanlat = Math.round((alapAjanlat * (Math.random() * 0.05 + 0.01)) / 100) * 100;
                if (cinikusAjanlat < 100) cinikusAjanlat = 100;
                
                let leiras = `Látom, kiment a(z) <b>${kiesoNyeremeny.display}</b>! A Bankár jót nevet rajtad, és felajánl egy kis aprót vigaszdíjnak buszjegyre...<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
                
                mutassFlipAjanlat("CINIKUS AJÁNLAT", formatValuta(cinikusAjanlat), leiras,[
                    { szoveg: "Ezt komolyan gondolja?! Elfogadom...", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(cinikusAjanlat, "Cinikus Bankár") },
                    { szoveg: "Kinevetem és megyek tovább!", osztaly: "btn-elutasit", akcio: () => elutasitSoronKivuli(cinikusAjanlat, "Cinikus Bankár") }
                ]);
            } else if (tipus === "vicces") {
                let viccesTargy = getRandomElem(BANKER_SURPRISE_JOKES); // Speciális vicces lista használata!
                let leiras = `Kiment a(z) <b>${kiesoNyeremeny.display}</b>! A Bankár kárörvendve felajánlja neked ezt a "nagyszerű" vigaszdíjat!<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, a játék véget ér!)</span>`;
                
                mutassFlipAjanlat("VIGASZDÍJ?", viccesTargy, leiras,[
                    { szoveg: "Jobb, mint a semmi...", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(viccesTargy, "Vigaszdíj") },
                    { szoveg: "Nem kérem a szemetét!", osztaly: "btn-elutasit", akcio: () => elutasitSoronKivuli(viccesTargy, "Vigaszdíj") }
                ]);
            } else if (tipus === "rendkivuli") {
                let premiumAjanlat = Math.round((alapAjanlat * (Math.random() * 0.4 + 1.2)) / 1000) * 1000;
                let maxVal = Math.max(...gameState.maradekNyeremenyek.map(n => n.value));
                if (premiumAjanlat >= maxVal) premiumAjanlat = Math.round(maxVal * 0.85 / 1000) * 1000;
                if (premiumAjanlat < 1000) premiumAjanlat = 1000;
                
                let leiras = `A Bankár bepánikolt, mert túl jól állsz! AZONNAL le akarja zárni a játékot egy rendkívüli ajánlattal!<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
                
                mutassFlipAjanlat("PÁNIK AJÁNLAT!", formatValuta(premiumAjanlat), leiras,[
                    { szoveg: "Megveszem!", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(premiumAjanlat, "Pánikoló Bankár") },
                    { szoveg: "Nem adom fel!", osztaly: "btn-elutasit", akcio: () => elutasitSoronKivuli(premiumAjanlat, "Pánikoló Bankár") }
                ]);
            }
        }

        function elfogadSoronKivuli(ajanlatErtek, tipus) {
            mutassUzenetet("Döntés rögzítve!", "Adminisztráció..."); 
            rejtFlipAjanlat(); 
            
            gameState.nyertOsszeg = ajanlatErtek; 
            gameState.marEladta = true;
            let kiiras = typeof ajanlatErtek === 'number' ? formatValuta(ajanlatErtek) : ajanlatErtek;
            
            rogzitAjanlat(`${tipus}: ${kiiras}`, 'Elfogadva');
            gameState.allapot = 'alku_elfogadva_kijatszas';
            
            mutassUzenetet(`ÁLL AZ ALKU SORON KÍVÜL! Megnyerted ezt: ${kiiras}!`, `De a játék megy tovább. Lássuk a kijátszást!`);
            setTimeout(folytatNyitasUtan, 4500); 
        }

        function elutasitSoronKivuli(ajanlatErtek, tipus) {
            mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); 
            rejtFlipAjanlat();
            
            let kiiras = typeof ajanlatErtek === 'number' ? formatValuta(ajanlatErtek) : ajanlatErtek;
            rogzitAjanlat(`Soron kívüli (${tipus}): ${kiiras}`, 'Elutasítva');
            
            setTimeout(folytatNyitasUtan, 1500);
        }

        async function kiertekelKorVege() {
            const maradekZartSzam = document.querySelectorAll('.taska:not(.nyitott)').length;
            if (maradekZartSzam === 1) {
                gameState.allapot = 'vegsokattintas'; document.querySelector(`.taska[data-taska-id='${gameState.sajatTaska}']`).classList.add('villogo-vegsokattintas');
                mutassUzenetet("A VÉGSŐ PILLANAT!", "Kattints rá, és derítsük ki végre, hogy mi volt nálad végig!");
                gameState.isProcessingClick = false; return;
            }
            if (maradekZartSzam === 2) { finalShowdown(); return; }

            const atlagErtek = gameState.maradekNyeremenyek.reduce((a, b) => a + b.value, 0) / gameState.maradekNyeremenyek.length;
            const boardHealth = atlagErtek / gameState.initialAverage;

            let phoneSub = "Figyeld az ajánlatot...";
            if (boardHealth > 1.2) { phoneSub = "A Bankár remegő hangon hívott... Nagyon szabadulna tőled!"; } 
            else if (boardHealth < 0.8) { phoneSub = "A Bankár röhögve hívott... Lássuk, mit kínál a gombokért!"; }

            mutassUzenetet("Csendet kérek! Csörög a telefon...", phoneSub, "", true); await wait(3500);
            
            const ajanlatErtek = calculateBankerOffer();
            
            if (gameState.marEladta) {
                let text = "Ezt az összeget ajánlotta volna most a Bankár.";
                mutassFlipAjanlat("MI LETT VOLNA HA...", formatValuta(ajanlatErtek), text,[
                    { szoveg: "Tovább a kijátszáshoz", osztaly: "btn-vegso", akcio: () => { 
                        mutassUzenetet("Kijátszás folytatódik...", "Lássuk mi maradt!"); 
                        rejtFlipAjanlat(); 
                        setTimeout(kovetkezoKor, 400); 
                    }}
                ]);
                return;
            }

            const twistEsely = Math.random(); let valasztottTwist = null;
            if (twistEsely < 0.65) { 
                const availableTwists =[];
                if (gameState.aktualisKor <= 1) availableTwists.push('sugo');
                if (gameState.aktualisKor >= 2 && gameState.aktualisKor <= 5) availableTwists.push('kombo', 'ot_koteg', 'felezo_duplazo', 'vak_csere_penzzel', 'szerencsekerek', 'szabad_csere');
                if (gameState.aktualisKor >= 3 && gameState.aktualisKor <= 6) availableTwists.push('vak_alku', 'rulett', 'harom_doboz', 'targy_csomag', 'szabad_csere');
                if (availableTwists.length > 0) valasztottTwist = getRandomElem(availableTwists);
            }

            switch(valasztottTwist) {
                case 'sugo': bankarSugo(); break;
                case 'ot_koteg': bankarOtKotegAjanlat(ajanlatErtek); break;
                case 'rulett': bankarRulettAjanlat(ajanlatErtek); break;
                case 'vak_alku': bankarVakAlkuTesz(ajanlatErtek * 1.4); break;
                case 'felezo_duplazo': bankarFelezoDuplazo(ajanlatErtek); break;
                case 'harom_doboz': bankarHaromDoboz(ajanlatErtek); break;
                case 'targy_csomag': bankarTargyCsomag(ajanlatErtek); break;
                case 'vak_csere_penzzel': bankarVakCserePenzzel(ajanlatErtek); break;
                case 'szabad_csere': bankarSzabadCsere(ajanlatErtek); break;
                case 'szerencsekerek': bankarSzerencsekerek(ajanlatErtek); break;
                case 'kombo': 
                    const poenok = gameState.maradekNyeremenyek.filter(n => n.type === 'vicc' || (n.type === 'targy' && n.value < 100000));
                    if (poenok.length > 0) { bankarAjanlatotTesz(ajanlatErtek, getRandomElem(poenok).display); } 
                    else { bankarAjanlatotTesz(ajanlatErtek); }
                    break;
                default: bankarAjanlatotTesz(ajanlatErtek); break;
            }
        }

        function calculateBankerOffer() {
            const maradekDb = gameState.maradekNyeremenyek.length;
            const atlag = gameState.maradekNyeremenyek.reduce((a, b) => a + b.value, 0) / maradekDb;
            const maxVal = Math.max(...gameState.maradekNyeremenyek.map(n => n.value));
            const progress = gameState.aktualisKor / (NYITASI_SZAMLALO.length - 1); 
            let percentage = 0.15 + (progress * 0.75); 
            if (maxVal > atlag * 3 && maradekDb <= 5) percentage *= 0.85; 
            percentage = percentage * (0.95 + (Math.random() * 0.1)); 
            if (gameState.lilaSajat) percentage *= 1.25;

            let ajanlatAlap = atlag * percentage; let vegleges = 0;
            if (ajanlatAlap > 1000000) vegleges = Math.round(ajanlatAlap / 10000) * 10000;
            else if (ajanlatAlap > 10000) vegleges = Math.round(ajanlatAlap / 1000) * 1000;
            else vegleges = Math.round(ajanlatAlap / 100) * 100;

            if (vegleges < 100) vegleges = 100; return vegleges;
        }

        async function bankarSugo() {
            const zartElemek = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).filter(t => t.dataset.taskaId != gameState.sajatTaska);
            const kisTaskak = zartElemek.filter(t => gameState.taskaErtekek[t.dataset.taskaId].value <= 50000);
            if (kisTaskak.length > 0) {
                const id = getRandomElem(kisTaskak).dataset.taskaId;
                mutassUzenetet("Bankári Súgó:", `A Bankár megsúgta: a(z) ${id}. táskában biztosan aprópénz vagy kacat van!`, "", true);
                await wait(5000); DOM.uzenetekKonteer.classList.remove('telefon-hivas-aktiv');
                bankarAjanlatotTesz(calculateBankerOffer());
            } else { bankarAjanlatotTesz(calculateBankerOffer()); }
        }

        function bankarAjanlatotTesz(ajanlatErtek, pluszTargy = null) {
            let osszegHTML = formatValuta(ajanlatErtek); 
            let leiras = "Ha elfogadod, garantáltan a tiéd ez az összeg.";
            if (pluszTargy) { 
                osszegHTML += `<br><span style="font-size: clamp(1rem, 2.5vw, 1.4rem); color:#fca5a5;">+ egy ${pluszTargy}!</span>`; 
                leiras = `A Bankár megőrült! A pénz mellé ODAADJA ezt is! <br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`; 
            } else {
                leiras += `<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
            }
            
            mutassFlipAjanlat(pluszTargy ? "KÜLÖNLEGES AJÁNLAT!" : "A Bankár Ajánlata:", osszegHTML, leiras,[
                { szoveg: "Áll az Alku!", osztaly: "btn-elfogad", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Adminisztráció..."); 
                    rejtFlipAjanlat(); 
                    alkuKezelese(ajanlatErtek, 'elfogad', pluszTargy);
                }},
                { szoveg: "Nincs alku!", osztaly: "btn-elutasit", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); 
                    rejtFlipAjanlat(); 
                    alkuKezelese(ajanlatErtek, 'elutasit');
                }}
            ]);
        }

        function bankarSzabadCsere(alapAjanlat) {
            let leiras = `A Bankár ajánlata VAGY elcserélheted a táskád BÁRMELYIK zártra!<br><span style='color:#fca5a5; font-weight:bold;'>(A csere után a játék folytatódik!)</span>`;
            mutassFlipAjanlat("PÉNZ VAGY CSERE!", formatValuta(alapAjanlat), leiras,[
                { szoveg: "Kérem a pénzt!", osztaly: "btn-elfogad", akcio: () => {
                    mutassUzenetet("Döntés rögzítve!", "Adminisztráció..."); rejtFlipAjanlat();

                else finalString = `A nyeremény ${formatValuta(baseWinnings)}!`;
            } else { 
                 let itemName = gameState.marEladta ? gameState.nyertOsszeg : nyeremeny.display;
                 if (gameState.bonuszPenz > 0) finalString = `A nyeremény ${itemName} + bónusz összeg: ${formatValuta(gameState.bonuszPenz)}!`;
                 else finalString = `A nyeremény: ${itemName}!`;
            }

            let choiceEval = "";
            if (gameState.marEladta) {
                if (nyeremeny.value > totalValue) choiceEval = `A táskád többet ért (${nyeremeny.display}), óriási hiba volt!`;
                else choiceEval = `Zseniális döntés volt eladni, a táskában csak ${nyeremeny.display} volt!`;
            } else { choiceEval = "Megmentetted a saját táskád a végéig!"; }

            let isBigWin = totalValue >= 1000000;
            let endMessage = isBigWin ? getRandomElem(HAPPY_ENDINGS) : getRandomElem(SAD_ENDINGS);
            
            let ctaHtml = `<br><br><span class="play-again-pulse" onclick="document.getElementById('uj-jatek-gomb').click()">Nincs még vége! Kattints ide, és toljunk le egy újabb kört! 😉</span>`;

            mutassUzenetet(finalString, `${choiceEval} ${endMessage} ${ctaHtml}`);
            gameState.isProcessingClick = true; 
        }

        function rogzitAjanlat(ajanlatSzoveg, dontes) {
            gameState.offerHistory.push({ round: gameState.aktualisKor, offer: ajanlatSzoveg, decision: dontes });
            DOM.ajanlatTortenet.classList.remove('rejtett');
            DOM.ajanlatLista.innerHTML = gameState.offerHistory.map(h => {
                let decisionClass = h.decision === 'Elfogadva' || h.decision === 'Végleges' ? 'ajanlat-dontes-elfogadva' : 'ajanlat-dontes-elutasitva';
                let liClass = (h.decision === 'Elfogadva' || h.decision === 'Végleges') ? 'ajanlat-lista-elfogadva-sor' : '';
                return `<li class="${liClass}"><span>${h.round}. kör: ${h.offer}</span> <span class="${decisionClass}">${h.decision}</span></li>`;
            }).join('');
        }

        DOM.ujJatekGomb.addEventListener('click', () => { if (confirm("Biztosan új játékot kezdesz?")) initGame(); });
        initGame();
    </script>
</body>
</html>
